apiVersion: v1
entries:
  wazuh:
  - annotations:
      artifacthub.io/changes: |
        - kind: added
          description: 3-node OpenSearch cluster with quorum and parallel bootstrap
        - kind: added
          description: Manager cluster mode (master + worker) with auto-configuration
        - kind: added
          description: Security init container with derived passwords (zero manual setup)
        - kind: added
          description: Namespace enrichment pipeline for multi-project labeling
        - kind: added
          description: Agent labels for multi-cluster identification
        - kind: added
          description: FQDN + ndots optimization to reduce DNS queries
        - kind: added
          description: Cert rotation CronJob with configurable expiration
        - kind: added
          description: Prometheus annotations for metrics scraping
        - kind: added
          description: PriorityClass, PDBs, preStop hooks for graceful operations
        - kind: added
          description: CI pipeline with helm lint, kubeconform, kube-score, pluto, trivy
        - kind: added
          description: Configurable init images, cert params, termination grace periods
        - kind: added
          description: NodePool isolation with taints for dedicated wazuh nodes
        - kind: changed
          description: Dashboard probes changed from HTTP to TCP (auth compatibility)
        - kind: changed
          description: Filebeat uses dedicated user instead of admin
        - kind: fixed
          description: Osquery warnings disabled (not installed in containers)
        - kind: fixed
          description: S3 sync error handling improved
        - kind: security
          description: Dashboard SSL verification enabled for indexer connection
      artifacthub.io/license: GPL-2.0
      artifacthub.io/signKey: ""
