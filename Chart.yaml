apiVersion: v2
name: wazuh
description: Production-ready Wazuh SIEM deployment for Kubernetes with Vault/ESO integration (optimized for EKS Auto Mode)
type: application
version: 1.2.6
appVersion: "4.14.4"
home: https://github.com/ileonelperea/wazuh-helm
sources:
  - https://github.com/ileonelperea/wazuh-helm
  - https://documentation.wazuh.com/
maintainers:
  - name: ileonelperea
    url: https://github.com/ileonelperea
keywords:
  - wazuh
  - siem
  - security
  - monitoring
  - opensearch
  - eks
  - kubernetes
  - threat-detection
  - vulnerability-detection
icon: https://wazuh.com/uploads/2022/05/WAZUH.png
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: "Self-healing rolling upgrades: postStart hook now patches existing wazuh-monitoring-* and wazuh-statistics-* indices to replicas=1, preventing UNASSIGNED shards after indexer rolling restart"
    - kind: added
      description: "indexer.driftDetection CronJob: periodically re-applies index template and repairs replica settings on monitoring/statistics indices (runs every 6h, gated by replicas > 1)"
    - kind: fixed
      description: "Readiness probe uses HTTP 200 instead of cluster health color — pods remain Ready even when cluster is temporarily RED during rolling update"
    - kind: added
      description: "dashboard.service.annotations — support for ExternalDNS and AWS LB Controller annotations on dashboard Service"
    - kind: security
      description: ".helmignore hardened: excludes vault-root-token*.json, values-*.yaml env files, internal docs, NodePool manifest, scripts/"
    - kind: changed
      description: "Credential rotation CronJob schedule changed to annually (0 2 1 1 *)"
    - kind: added
      description: "dashboard.ssl.enabled flag for optional HTTPS on dashboard server (default false)"
    - kind: added
      description: "indexer.enabled, manager.enabled, dashboard.enabled flags for agent-only deployments"
    - kind: added
      description: "agent.externalManagerAddress — cross-cluster support via Route53 PHZ or static hostname"
    - kind: changed
      description: "NetworkPolicy agent egress: podSelector for same-cluster, open ports for cross-cluster (manager.enabled=false)"
    - kind: changed
      description: "Certs and component secrets are now conditional on their respective component enabled flag"
    - kind: added
      description: "vault.readAdminPasswordFromVault flag — bootstrap job reads admin password from Vault KV"
    - kind: added
      description: "Credential rotation CronJob with Vault mode reads adminPassword from Vault"
    - kind: security
      description: "Bootstrap job conditional — disabled after first install eliminates need for persistent high-privilege tokens"
    - kind: added
      description: "External Secrets Operator (ESO) integration with ClusterSecretStore for Vault"
    - kind: added
      description: "4 ExternalSecret resources (indexer, api, dashboard, filebeat credentials)"
    - kind: added
      description: "Vault bootstrap job auto-configures KV v2, K8s auth, policy, role"
    - kind: added
      description: "vault.bootstrap section with image, tag, resources configuration"
    - kind: added
      description: "vault.serviceAccount, vault.refreshInterval, vault.deletionPolicy for ESO"
    - kind: changed
      description: "vault section replaces Agent Injector (vault-bridge) with ESO workflow"
    - kind: removed
      description: "vault.agentResources removed (replaced by bootstrap.resources)"
    - kind: removed
      description: "Vault Agent Injector integration (vault-bridge) superseded by ESO"
    - kind: fixed
      description: "Remove artifacthub.io/signKey empty annotation that silently blocked version tracking"
    - kind: added
      description: "ADR-001: ArgoCD vs Standalone Helm for stateful workloads"
    - kind: security
      description: "seccompProfile RuntimeDefault on all pods"
    - kind: security
      description: "Drop ALL capabilities on every container with minimal per-component adds"
    - kind: security
      description: "allowPrivilegeEscalation false on all containers"
    - kind: security
      description: "wazuh.yml chmod 640 prevents duplicate hosts key crash"
    - kind: security
      description: "Bootstrap secrets mounted as files instead of env vars (prevents kubectl describe exposure)"
    - kind: security
      description: "Conditional TLS verification in bootstrap job based on vault.tlsSkipVerify"
    - kind: security
      description: "Bootstrap secrets auto-cleaned after hook completion (hook-delete-policy)"
    - kind: security
      description: "Rotation RBAC scoped to vault namespace only (no cluster-wide pods/exec)"
    - kind: added
      description: "Credential rotation CronJob with Vault mode and ESO force-sync"
    - kind: added
      description: "Active ESO polling replaces blind sleep during credential rotation"
    - kind: added
      description: "Ordered startup via init containers (Indexer → Manager → Dashboard)"
    - kind: added
      description: "wait-for-indexer init container on Manager (TCP 9200)"
    - kind: added
      description: "wait-for-dependencies init container on Dashboard (TCP 9200 + 55000)"
    - kind: added
      description: "kibana_wazuh_access role and mapping for dashboard index access"
    - kind: added
      description: "Rebuild index script for Helm repository recovery"
    - kind: changed
      description: "Agents use native Wazuh retry instead of init container wait"
    - kind: changed
      description: "Manager readiness probe initialDelaySeconds 30 to 45"
    - kind: changed
      description: "Release workflow regenerates index.yaml from scratch (no merge)"
    - kind: fixed
      description: "serviceAccountName fallback for dashboard/indexer when Vault disabled"
    - kind: fixed
      description: "Template permissions added to manage_wazuh_index role"
  artifacthub.io/license: MIT
