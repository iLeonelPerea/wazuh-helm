name: Release Charts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint .

      - name: Helm Template
        run: helm template wazuh . > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Kubeconform (schema validation)
        run: helm template wazuh . | kubeconform -strict -summary

      - name: Install kube-score
        run: |
          curl -sL https://github.com/zegl/kube-score/releases/download/v1.20.0/kube-score_1.20.0_linux_amd64.tar.gz | tar xz
          sudo mv kube-score /usr/local/bin/

      - name: Kube-score (best practices)
        continue-on-error: true
        run: helm template wazuh . | kube-score score - --output-format ci

      - name: Install pluto
        run: |
          PLUTO_VERSION=$(curl -s https://api.github.com/repos/FairwindsOps/pluto/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL "https://github.com/FairwindsOps/pluto/releases/download/${PLUTO_VERSION}/pluto_${PLUTO_VERSION#v}_linux_amd64.tar.gz" | tar xz
          sudo mv pluto /usr/local/bin/

      - name: Pluto (deprecated APIs)
        run: helm template wazuh . | pluto detect -

      - name: Trivy (misconfigurations)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: /tmp/rendered.yaml
          severity: CRITICAL
          exit-code: 1

      - name: Chart Testing Lint
        uses: helm/chart-testing-action@v2.7.0
      - run: ct lint --charts . --validate-maintainers=false

  release:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Get chart version
        id: chart
        run: |
          echo "version=$(grep '^version:' Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "name=$(grep '^name:' Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Package chart
        run: |
          helm package .
          mkdir -p .cr-release-packages
          mv *.tgz .cr-release-packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.chart.outputs.version }}
          name: ${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}
          files: .cr-release-packages/*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update gh-pages index
        run: |
          # Save packaged chart
          cp .cr-release-packages/*.tgz /tmp/

          # Switch to gh-pages, preserving existing content
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          mkdir -p charts

          # Copy new chart package
          cp /tmp/*.tgz charts/

          # Download previous release tgz files that might be missing locally
          for tag in $(git tag -l 'v*'); do
            VERSION="${tag#v}"
            if [ ! -f "charts/wazuh-${VERSION}.tgz" ]; then
              echo "Downloading wazuh-${VERSION}.tgz from release ${tag}..."
              gh release download "${tag}" --pattern "*.tgz" --dir charts/ 2>/dev/null || true
            fi
          done

          # Build index merging with existing if present
          if [ -f index.yaml ]; then
            helm repo index charts --url https://ileonelperea.github.io/wazuh-helm/charts --merge index.yaml
          else
            helm repo index charts --url https://ileonelperea.github.io/wazuh-helm/charts
          fi
          mv charts/index.yaml .

          git add index.yaml charts/
          git commit -m "Update Helm repo index for v${{ steps.chart.outputs.version }}" || echo "No changes to commit"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
