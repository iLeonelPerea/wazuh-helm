name: Release Charts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint .

      - name: Helm Template
        run: helm template wazuh . > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Kubeconform (schema validation)
        run: helm template wazuh . | kubeconform -strict -summary

      - name: Install kube-score
        run: |
          curl -sL https://github.com/zegl/kube-score/releases/download/v1.20.0/kube-score_1.20.0_linux_amd64.tar.gz | tar xz
          sudo mv kube-score /usr/local/bin/

      - name: Kube-score (best practices)
        continue-on-error: true
        run: helm template wazuh . | kube-score score - --output-format ci

      - name: Install pluto
        run: |
          PLUTO_VERSION=$(curl -s https://api.github.com/repos/FairwindsOps/pluto/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL "https://github.com/FairwindsOps/pluto/releases/download/${PLUTO_VERSION}/pluto_${PLUTO_VERSION#v}_linux_amd64.tar.gz" | tar xz
          sudo mv pluto /usr/local/bin/

      - name: Pluto (deprecated APIs)
        run: helm template wazuh . | pluto detect -

      - name: Trivy (misconfigurations)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: /tmp/rendered.yaml
          severity: CRITICAL
          exit-code: 1

      - name: Chart Testing Lint
        uses: helm/chart-testing-action@v2.7.0
      - run: ct lint --charts . --validate-maintainers=false

  release:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Get chart version
        id: chart
        run: |
          echo "version=$(grep '^version:' Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "name=$(grep '^name:' Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.chart.outputs.version }}"
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${VERSION} already exists, skipping release creation"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v${VERSION} does not exist, will create"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        if: steps.check_release.outputs.exists == 'false'
        run: |
          helm package .
          mkdir -p .cr-release-packages
          mv *.tgz .cr-release-packages/

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.chart.outputs.version }}
          name: ${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}
          files: .cr-release-packages/*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild gh-pages index from scratch
        run: |
          set -euo pipefail
          VERSION="${{ steps.chart.outputs.version }}"

          # Create clean working directory
          WORK_DIR=$(mktemp -d)
          mkdir -p "${WORK_DIR}/charts"

          # Download .tgz from EVERY GitHub Release that has assets
          echo "=== Downloading chart packages from all releases ==="
          for tag in $(gh release list --limit 100 --json tagName -q '.[].tagName' | sort -V); do
            echo "Processing release ${tag}..."
            gh release download "${tag}" \
              --pattern "*.tgz" \
              --dir "${WORK_DIR}/charts/" 2>/dev/null || {
              echo "  WARN: No .tgz asset in release ${tag}, skipping"
              continue
            }
            echo "  OK: Downloaded assets for ${tag}"
          done

          # Verify we have at least the current version
          CURRENT_TGZ="${WORK_DIR}/charts/wazuh-${VERSION}.tgz"
          if [ ! -f "${CURRENT_TGZ}" ]; then
            echo "WARN: Current version ${VERSION} not found in releases, packaging from source..."
            helm package . --destination "${WORK_DIR}/charts/"
          fi

          # List what we have
          echo "=== Chart packages collected ==="
          ls -la "${WORK_DIR}/charts/"

          # Generate index.yaml from scratch (NO merge)
          echo "=== Generating index.yaml ==="
          helm repo index "${WORK_DIR}/charts" \
            --url https://ileonelperea.github.io/wazuh-helm/charts

          # Verify generated index
          echo "=== Verifying index.yaml ==="
          ENTRIES=$(grep -c 'version:' "${WORK_DIR}/charts/index.yaml" || echo "0")
          echo "Found ${ENTRIES} chart version(s) in index"
          cat "${WORK_DIR}/charts/index.yaml"

          if [ "${ENTRIES}" -eq 0 ]; then
            echo "ERROR: index.yaml has no entries!"
            exit 1
          fi

          # Switch to gh-pages branch
          git stash --include-untracked || true
          if git rev-parse --verify origin/gh-pages &>/dev/null; then
            git checkout gh-pages
            # Clean old charts directory
            rm -rf charts index.yaml
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Copy fresh content
          mkdir -p charts
          cp "${WORK_DIR}/charts/"*.tgz charts/
          cp "${WORK_DIR}/charts/index.yaml" .

          # Copy static files from main branch if they exist
          git checkout main -- artifacthub-repo.yml 2>/dev/null || true

          # Commit and push
          git add index.yaml charts/ artifacthub-repo.yml 2>/dev/null || true
          git commit -m "Release v${VERSION}: rebuild index with $(ls charts/*.tgz | wc -l) chart(s)" || echo "No changes to commit"
          git push origin gh-pages

          # Cleanup
          rm -rf "${WORK_DIR}"
          echo "=== Done ==="
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
