<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeWazuh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744" />
      <stop offset="100%" style="stop-color:#0d1b2a" />
    </linearGradient>
    <linearGradient id="nodeGeneral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a" />
      <stop offset="100%" style="stop-color:#0d2a1a" />
    </linearGradient>
    <linearGradient id="indexerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4" />
      <stop offset="100%" style="stop-color:#0097a7" />
    </linearGradient>
    <linearGradient id="managerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800" />
      <stop offset="100%" style="stop-color:#f57c00" />
    </linearGradient>
    <linearGradient id="dashboardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff" />
      <stop offset="100%" style="stop-color:#651fff" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50" />
      <stop offset="100%" style="stop-color:#388e3c" />
    </linearGradient>
    <linearGradient id="s3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100" />
      <stop offset="100%" style="stop-color:#bf360c" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" letter-spacing="1">Wazuh SIEM on EKS Auto Mode</text>
  <text x="600" y="58" text-anchor="middle" fill="#6b7fa3" font-size="12">Helm Chart Architecture — v1.0.0</text>

  <!-- EKS Cluster boundary -->
  <rect x="30" y="70" width="1140" height="650" rx="16" fill="none" stroke="#2a3a5c" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="40" y="62" width="200" height="22" rx="4" fill="#0a0e1a"/>
  <text x="50" y="78" fill="#4a90d9" font-size="13" font-weight="600">EKS Auto Mode Cluster</text>

  <!-- Karpenter NodePool: wazuh (left section) -->
  <rect x="50" y="95" width="680" height="520" rx="12" fill="url(#nodeWazuh)" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="55" y="88" width="250" height="20" rx="4" fill="#0a0e1a"/>
  <text x="65" y="103" fill="#4a90d9" font-size="11" font-weight="600">NodePool: wazuh</text>
  <text x="200" y="103" fill="#3a5a8a" font-size="10">taint: workload=wazuh:NoSchedule</text>

  <!-- Indexer Cluster -->
  <text x="120" y="135" fill="#80deea" font-size="13" font-weight="600">OpenSearch Cluster (3 nodes)</text>

  <!-- Indexer 0 -->
  <rect x="70" y="148" width="195" height="100" rx="8" fill="url(#indexerGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="167" y="170" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Indexer-0</text>
  <text x="167" y="186" text-anchor="middle" fill="#e0f7fa" font-size="9">cluster-manager</text>
  <text x="167" y="204" text-anchor="middle" fill="#b2ebf2" font-size="9">Port 9200 / 9300</text>
  <text x="167" y="220" text-anchor="middle" fill="#b2ebf2" font-size="9">PVC: 10Gi gp3</text>
  <text x="167" y="236" text-anchor="middle" fill="#b2ebf2" font-size="9">Heap: 1.5Gi</text>

  <!-- Indexer 1 -->
  <rect x="280" y="148" width="195" height="100" rx="8" fill="url(#indexerGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="377" y="170" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Indexer-1</text>
  <text x="377" y="186" text-anchor="middle" fill="#e0f7fa" font-size="9">data node</text>
  <text x="377" y="204" text-anchor="middle" fill="#b2ebf2" font-size="9">Port 9200 / 9300</text>
  <text x="377" y="220" text-anchor="middle" fill="#b2ebf2" font-size="9">PVC: 10Gi gp3</text>
  <text x="377" y="236" text-anchor="middle" fill="#b2ebf2" font-size="9">Heap: 1.5Gi</text>

  <!-- Indexer 2 -->
  <rect x="490" y="148" width="195" height="100" rx="8" fill="url(#indexerGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="587" y="170" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Indexer-2</text>
  <text x="587" y="186" text-anchor="middle" fill="#e0f7fa" font-size="9">data node</text>
  <text x="587" y="204" text-anchor="middle" fill="#b2ebf2" font-size="9">Port 9200 / 9300</text>
  <text x="587" y="220" text-anchor="middle" fill="#b2ebf2" font-size="9">PVC: 10Gi gp3</text>
  <text x="587" y="236" text-anchor="middle" fill="#b2ebf2" font-size="9">Heap: 1.5Gi</text>

  <!-- Enrichment Pipeline badge -->
  <rect x="200" y="260" width="350" height="24" rx="12" fill="#1a237e" stroke="#3949ab" stroke-width="1"/>
  <text x="375" y="276" text-anchor="middle" fill="#7986cb" font-size="10" font-weight="600">Ingest Pipeline: namespace enrichment → project/component/team</text>

  <!-- Manager Cluster -->
  <text x="120" y="310" fill="#ffcc80" font-size="13" font-weight="600">Manager Cluster</text>

  <!-- Manager 0 (Master) -->
  <rect x="70" y="325" width="290" height="120" rx="8" fill="url(#managerGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="215" y="348" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Manager-0 (Master)</text>
  <text x="215" y="366" text-anchor="middle" fill="#fff3e0" font-size="9">Wazuh analysisd + remoted</text>
  <text x="215" y="382" text-anchor="middle" fill="#ffe0b2" font-size="9">Filebeat → Indexer (filebeat_internal user)</text>
  <text x="215" y="398" text-anchor="middle" fill="#ffe0b2" font-size="9">Ports: 1514 (agents) / 55000 (API)</text>
  <text x="215" y="414" text-anchor="middle" fill="#ffe0b2" font-size="9">PVC: 30Gi | S3 Sync sidecar</text>
  <text x="215" y="430" text-anchor="middle" fill="#ffe0b2" font-size="9">Custom rules + log rotation</text>

  <!-- Manager 1 (Worker) -->
  <rect x="380" y="325" width="290" height="120" rx="8" fill="url(#managerGrad)" filter="url(#shadow)" opacity="0.85"/>
  <text x="525" y="348" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Manager-1 (Worker)</text>
  <text x="525" y="366" text-anchor="middle" fill="#fff3e0" font-size="9">Wazuh analysisd + remoted</text>
  <text x="525" y="382" text-anchor="middle" fill="#ffe0b2" font-size="9">Filebeat → Indexer (filebeat_internal user)</text>
  <text x="525" y="398" text-anchor="middle" fill="#ffe0b2" font-size="9">Port 1516 (cluster sync)</text>
  <text x="525" y="414" text-anchor="middle" fill="#ffe0b2" font-size="9">PVC: 30Gi | S3 Sync sidecar</text>
  <text x="525" y="430" text-anchor="middle" fill="#ffe0b2" font-size="9">Agent keys + config replication</text>

  <!-- Dashboard -->
  <rect x="70" y="470" width="290" height="90" rx="8" fill="url(#dashboardGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="215" y="495" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Dashboard</text>
  <text x="215" y="513" text-anchor="middle" fill="#ede7f6" font-size="9">OpenSearch Dashboards + Wazuh Plugin</text>
  <text x="215" y="529" text-anchor="middle" fill="#d1c4e9" font-size="9">Port 5601 | kibanaserver user</text>
  <text x="215" y="545" text-anchor="middle" fill="#d1c4e9" font-size="9">wazuh.yml auto-configured via init container</text>

  <!-- CronJobs -->
  <rect x="380" y="470" width="140" height="90" rx="8" fill="#37474f" filter="url(#shadow)" stroke="#546e7a" stroke-width="1"/>
  <text x="450" y="495" text-anchor="middle" fill="#b0bec5" font-size="11" font-weight="600">CronJobs</text>
  <text x="450" y="515" text-anchor="middle" fill="#78909c" font-size="9">Cleanup: */2h</text>
  <text x="450" y="531" text-anchor="middle" fill="#78909c" font-size="9">Cert Rotation: weekly</text>

  <!-- Security Init -->
  <rect x="535" y="470" width="140" height="90" rx="8" fill="#37474f" filter="url(#shadow)" stroke="#546e7a" stroke-width="1"/>
  <text x="605" y="495" text-anchor="middle" fill="#b0bec5" font-size="11" font-weight="600">Security Init</text>
  <text x="605" y="515" text-anchor="middle" fill="#78909c" font-size="9">Derived passwords</text>
  <text x="605" y="531" text-anchor="middle" fill="#78909c" font-size="9">bcrypt hash gen</text>
  <text x="605" y="547" text-anchor="middle" fill="#78909c" font-size="9">securityadmin.sh</text>

  <!-- Karpenter NodePool: general-purpose (right section) -->
  <rect x="750" y="95" width="400" height="520" rx="12" fill="url(#nodeGeneral)" stroke="#1e5f3a" stroke-width="1.5"/>
  <rect x="755" y="88" width="200" height="20" rx="4" fill="#0a0e1a"/>
  <text x="765" y="103" fill="#66bb6a" font-size="11" font-weight="600">NodePool: general-purpose</text>

  <!-- Agents -->
  <text x="830" y="135" fill="#a5d6a7" font-size="13" font-weight="600">Wazuh Agents (DaemonSet)</text>

  <!-- Agent boxes -->
  <rect x="770" y="148" width="170" height="80" rx="8" fill="url(#agentGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="855" y="172" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Agent (Node 1)</text>
  <text x="855" y="190" text-anchor="middle" fill="#c8e6c9" font-size="9">Container log collection</text>
  <text x="855" y="206" text-anchor="middle" fill="#c8e6c9" font-size="9">SIEM-only mode</text>
  <text x="855" y="218" text-anchor="middle" fill="#c8e6c9" font-size="9">→ Manager:1514</text>

  <rect x="960" y="148" width="170" height="80" rx="8" fill="url(#agentGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="1045" y="172" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Agent (Node 2)</text>
  <text x="1045" y="190" text-anchor="middle" fill="#c8e6c9" font-size="9">Container log collection</text>
  <text x="1045" y="206" text-anchor="middle" fill="#c8e6c9" font-size="9">SIEM-only mode</text>
  <text x="1045" y="218" text-anchor="middle" fill="#c8e6c9" font-size="9">→ Manager:1514</text>

  <rect x="770" y="240" width="170" height="80" rx="8" fill="url(#agentGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="855" y="264" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Agent (Node N)</text>
  <text x="855" y="282" text-anchor="middle" fill="#c8e6c9" font-size="9">Container log collection</text>
  <text x="855" y="298" text-anchor="middle" fill="#c8e6c9" font-size="9">Labels: cluster, env, region</text>
  <text x="855" y="310" text-anchor="middle" fill="#c8e6c9" font-size="9">→ Manager:1514</text>

  <!-- Workloads -->
  <text x="830" y="350" fill="#81c784" font-size="13" font-weight="600">Application Workloads</text>

  <rect x="770" y="365" width="170" height="70" rx="8" fill="#1b5e20" filter="url(#shadow)" stroke="#2e7d32" stroke-width="1" opacity="0.8"/>
  <text x="855" y="390" text-anchor="middle" fill="#a5d6a7" font-size="11" font-weight="600">kamet-apps</text>
  <text x="855" y="408" text-anchor="middle" fill="#81c784" font-size="9">payment-core</text>
  <text x="855" y="422" text-anchor="middle" fill="#81c784" font-size="9">account-management</text>

  <rect x="960" y="365" width="170" height="70" rx="8" fill="#1b5e20" filter="url(#shadow)" stroke="#2e7d32" stroke-width="1" opacity="0.8"/>
  <text x="1045" y="390" text-anchor="middle" fill="#a5d6a7" font-size="11" font-weight="600">kamet-prepaid</text>
  <text x="1045" y="408" text-anchor="middle" fill="#81c784" font-size="9">kmt-prepaid-core</text>
  <text x="1045" y="422" text-anchor="middle" fill="#81c784" font-size="9">kmt-services</text>

  <!-- Monitoring stack -->
  <rect x="770" y="450" width="360" height="50" rx="8" fill="#263238" stroke="#37474f" stroke-width="1"/>
  <text x="950" y="472" text-anchor="middle" fill="#78909c" font-size="11" font-weight="600">Prometheus + Grafana (existing)</text>
  <text x="950" y="488" text-anchor="middle" fill="#546e7a" font-size="9">Scrapes Wazuh pods via prometheus.io annotations</text>

  <!-- S3 Bucket (bottom right) -->
  <rect x="770" y="520" width="360" height="80" rx="8" fill="url(#s3Grad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="950" y="548" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">S3: wazuh-archives</text>
  <text x="950" y="566" text-anchor="middle" fill="#ffccbc" font-size="9">Cold storage via sidecar sync (every 5 min)</text>
  <text x="950" y="582" text-anchor="middle" fill="#ffccbc" font-size="9">Pod Identity (IAM role) | Lifecycle → Glacier (6 months)</text>

  <!-- Data flow arrows -->
  <!-- Agents to Manager -->
  <line x1="770" y1="200" x2="360" y2="345" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <line x1="770" y1="280" x2="360" y2="370" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Manager to Indexer -->
  <line x1="215" y1="325" x2="215" y2="248" stroke="#ff9800" stroke-width="2" opacity="0.7"/>
  <polygon points="215,252 210,262 220,262" fill="#ff9800" opacity="0.7"/>
  <line x1="525" y1="325" x2="525" y2="248" stroke="#ff9800" stroke-width="2" opacity="0.7"/>
  <polygon points="525,252 520,262 530,262" fill="#ff9800" opacity="0.7"/>

  <!-- Dashboard to Indexer -->
  <line x1="215" y1="470" x2="215" y2="290" stroke="#7c4dff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Manager to S3 -->
  <line x1="670" y1="400" x2="770" y2="550" stroke="#e65100" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- ISM Policy badge -->
  <rect x="70" y="580" width="280" height="24" rx="12" fill="#0d47a1" stroke="#1565c0" stroke-width="1"/>
  <text x="210" y="596" text-anchor="middle" fill="#64b5f6" font-size="10" font-weight="600">ISM Policy: 180 days hot → delete</text>

  <!-- TLS badge -->
  <rect x="370" y="580" width="200" height="24" rx="12" fill="#1b5e20" stroke="#2e7d32" stroke-width="1"/>
  <text x="470" y="596" text-anchor="middle" fill="#81c784" font-size="10" font-weight="600">TLS: auto-generated certs</text>

  <!-- Legend -->
  <rect x="50" y="630" width="1100" height="80" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="70" y="652" fill="#8b949e" font-size="11" font-weight="600">Data Flow</text>

  <line x1="70" y1="668" x2="120" y2="668" stroke="#4caf50" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="130" y="672" fill="#8b949e" font-size="10">Agents → Manager (1514/TCP)</text>

  <line x1="350" y1="668" x2="400" y2="668" stroke="#ff9800" stroke-width="2"/>
  <text x="410" y="672" fill="#8b949e" font-size="10">Filebeat → Indexer (9200/HTTPS)</text>

  <line x1="650" y1="668" x2="700" y2="668" stroke="#7c4dff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="710" y="672" fill="#8b949e" font-size="10">Dashboard → Indexer (9200/HTTPS)</text>

  <line x1="950" y1="668" x2="1000" y2="668" stroke="#e65100" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1010" y="672" fill="#8b949e" font-size="10">S3 Sync (sidecar)</text>

  <text x="70" y="698" fill="#6b7fa3" font-size="10">Passwords derived from adminPassword (sha256) | Zero DNS queries (K8s env vars) | ndots:1 + FQDN trailing dot | PriorityClass: wazuh-critical</text>
</svg>
