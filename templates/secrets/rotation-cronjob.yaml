{{- if .Values.credentialRotation.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.credentialRotation.schedule | quote }}
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "wazuh.labels" . | nindent 12 }}
            app.kubernetes.io/component: credential-rotation
        spec:
          serviceAccountName: {{ include "wazuh.fullname" . }}-credential-rotation
          restartPolicy: OnFailure
          {{- include "wazuh.dnsConfig" . | nindent 10 }}
          {{- with .Values.indexer.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.indexer.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
          containers:
            - name: credential-rotation
              image: "{{ .Values.credentialRotation.image.repository }}:{{ .Values.credentialRotation.image.tag }}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                {{- toYaml .Values.credentialRotation.resources | nindent 16 }}
              env:
                - name: FULLNAME
                  value: {{ include "wazuh.fullname" . | quote }}
                - name: NAMESPACE
                  value: {{ .Release.Namespace | quote }}
                - name: ROTATION_MODE
                  value: {{ .Values.credentialRotation.mode | quote }}
                - name: VAULT_MOUNT
                  value: {{ .Values.credentialRotation.vaultMount | quote }}
                - name: ESO_SYNC_WAIT
                  value: {{ .Values.credentialRotation.esoSyncWaitSeconds | quote }}
                - name: HEALTH_CHECK_ENABLED
                  value: {{ .Values.credentialRotation.healthCheck.enabled | quote }}
                - name: HEALTH_CHECK_TIMEOUT
                  value: {{ .Values.credentialRotation.healthCheck.timeoutSeconds | quote }}
                - name: INDEXER_HOST
                  value: {{ include "wazuh.indexer.host" . | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  echo "============================================"
                  echo "=== Wazuh Credential Rotation Job ==="
                  echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
                  echo "=== Mode: ${ROTATION_MODE} ==="
                  echo "============================================"

                  # --- Step 1: Generate new admin password ---
                  echo ""
                  echo "=== Step 1: Generating new credentials ==="
                  NEW_ADMIN_PASS=$(cat /dev/urandom | tr -dc 'A-Za-z0-9!@#$%' | head -c 32)
                  # Ensure password meets complexity: at least 1 upper, 1 lower, 1 digit, 1 special
                  NEW_ADMIN_PASS="${NEW_ADMIN_PASS}Aa1!"

                  # Derive internal passwords (same logic as _helpers.tpl)
                  KIBANA_PASS=$(printf "%s-kibanaserver" "$NEW_ADMIN_PASS" | sha256sum | head -c 20)"!1A"
                  FILEBEAT_PASS=$(printf "%s-filebeat" "$NEW_ADMIN_PASS" | sha256sum | head -c 20)"!1A"
                  API_PASS=$(printf "%s-api" "$NEW_ADMIN_PASS" | sha256sum | head -c 20)"!1A"

                  PASS_LEN=$(echo -n "$NEW_ADMIN_PASS" | wc -c | tr -d ' ')
                  echo "New admin password generated (length: ${PASS_LEN})"
                  echo "Derived passwords: kibanaserver, filebeat, api"

                  # --- Step 2: Update credentials based on mode ---
                  echo ""
                  echo "=== Step 2: Updating credentials (mode=${ROTATION_MODE}) ==="

                  if [ "$ROTATION_MODE" = "vault" ]; then
                    # ---- Vault mode: write to Vault KV, ESO syncs to K8s ----
                    echo "Writing new credentials to Vault KV at ${VAULT_MOUNT}/..."

                    # Find Vault pod in vault namespace
                    VAULT_POD=$(kubectl get pods -n vault -l app.kubernetes.io/name=vault --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                    if [ -z "$VAULT_POD" ]; then
                      echo "ERROR: No running Vault pod found in vault namespace"
                      exit 1
                    fi
                    echo "Using Vault pod: $VAULT_POD"

                    # Validate Vault is unsealed and accessible
                    kubectl exec -n vault "$VAULT_POD" -- vault status > /dev/null 2>&1 || \
                      { echo "ERROR: Vault is sealed or not accessible in pod $VAULT_POD"; exit 1; }
                    echo "Vault status: OK (unsealed and accessible)"

                    # Write each credential to Vault KV v2 (via stdin to avoid /proc/cmdline leakage)
                    printf '{"username":"admin","password":"%s"}' "$NEW_ADMIN_PASS" | \
                      kubectl exec -i -n vault "$VAULT_POD" -- vault kv put "${VAULT_MOUNT}/indexer-credentials" - \
                      || { echo "ERROR: Failed to write indexer-credentials to Vault"; exit 1; }

                    printf '{"username":"wazuh-wui","password":"%s"}' "$API_PASS" | \
                      kubectl exec -i -n vault "$VAULT_POD" -- vault kv put "${VAULT_MOUNT}/api-credentials" - \
                      || { echo "ERROR: Failed to write api-credentials to Vault"; exit 1; }

                    printf '{"password":"%s"}' "$KIBANA_PASS" | \
                      kubectl exec -i -n vault "$VAULT_POD" -- vault kv put "${VAULT_MOUNT}/dashboard-credentials" - \
                      || { echo "ERROR: Failed to write dashboard-credentials to Vault"; exit 1; }

                    printf '{"password":"%s"}' "$FILEBEAT_PASS" | \
                      kubectl exec -i -n vault "$VAULT_POD" -- vault kv put "${VAULT_MOUNT}/filebeat-credentials" - \
                      || { echo "ERROR: Failed to write filebeat-credentials to Vault"; exit 1; }

                    echo "All credentials written to Vault KV"

                    # Force ESO to resync by annotating all ExternalSecrets
                    echo ""
                    echo "=== Forcing ESO to sync K8s Secrets from Vault ==="
                    FORCE_SYNC_TS=$(date +%s)
                    for SECRET in indexer-credentials api-credentials dashboard-credentials filebeat-credentials; do
                      EXTERNAL_SECRET="${FULLNAME}-${SECRET}"
                      echo "Force-syncing ExternalSecret: $EXTERNAL_SECRET"
                      kubectl annotate externalsecret "$EXTERNAL_SECRET" \
                        "force-sync=${FORCE_SYNC_TS}" --overwrite -n "$NAMESPACE" \
                        || { echo "WARNING: Failed to annotate $EXTERNAL_SECRET"; }
                    done

                    # Poll ExternalSecrets until they report successful sync
                    echo "Polling for SecretSynced condition (timeout: ${ESO_SYNC_WAIT}s)..."
                    START_TIME=$(date +%s)
                    SYNCED_COUNT=0
                    while [ $SYNCED_COUNT -lt 4 ] && [ $(($(date +%s) - START_TIME)) -lt "$ESO_SYNC_WAIT" ]; do
                      SYNCED_COUNT=0
                      for SECRET in indexer-credentials api-credentials dashboard-credentials filebeat-credentials; do
                        EXTERNAL_SECRET="${FULLNAME}-${SECRET}"
                        CONDITION=$(kubectl get externalsecret "$EXTERNAL_SECRET" -n "$NAMESPACE" \
                          -o jsonpath='{.status.conditions[0].reason}' 2>/dev/null || echo "")
                        if [ "$CONDITION" = "SecretSynced" ]; then
                          SYNCED_COUNT=$((SYNCED_COUNT + 1))
                        fi
                      done
                      if [ $SYNCED_COUNT -lt 4 ]; then
                        echo "Synced: $SYNCED_COUNT/4 ExternalSecrets, retrying in 5s..."
                        sleep 5
                      fi
                    done

                    if [ $SYNCED_COUNT -eq 4 ]; then
                      echo "All ExternalSecrets synced successfully"
                    else
                      echo "WARNING: Only $SYNCED_COUNT/4 ExternalSecrets synced within ${ESO_SYNC_WAIT}s"
                      echo "Proceeding with restart, but some K8s Secrets may not be updated"
                    fi

                  elif [ "$ROTATION_MODE" = "kubernetes" ]; then
                    # ---- Kubernetes mode: update K8s Secrets directly ----
                    echo "Updating K8s Secrets directly..."

                    # Encode credentials to base64 (in-shell, no subprocess leakage)
                    B64_ADMIN_USER=$(printf 'admin' | base64)
                    B64_ADMIN_PASS=$(printf '%s' "$NEW_ADMIN_PASS" | base64)
                    B64_API_USER=$(printf 'wazuh-wui' | base64)
                    B64_API_PASS=$(printf '%s' "$API_PASS" | base64)
                    B64_KIBANA_PASS=$(printf '%s' "$KIBANA_PASS" | base64)
                    B64_FILEBEAT_PASS=$(printf '%s' "$FILEBEAT_PASS" | base64)

                    # Update indexer credentials (via jq env vars to avoid cmdline leakage)
                    kubectl get secret "${FULLNAME}-indexer-credentials" -n "$NAMESPACE" -o json | \
                      B64U="$B64_ADMIN_USER" B64P="$B64_ADMIN_PASS" \
                      jq '.data.username = env.B64U | .data.password = env.B64P' | \
                      kubectl apply -f - || { echo "ERROR: Failed to update indexer-credentials"; exit 1; }

                    # Update API credentials
                    kubectl get secret "${FULLNAME}-api-credentials" -n "$NAMESPACE" -o json | \
                      B64U="$B64_API_USER" B64P="$B64_API_PASS" \
                      jq '.data.username = env.B64U | .data.password = env.B64P' | \
                      kubectl apply -f - || { echo "ERROR: Failed to update api-credentials"; exit 1; }

                    # Update dashboard credentials
                    kubectl get secret "${FULLNAME}-dashboard-credentials" -n "$NAMESPACE" -o json | \
                      B64P="$B64_KIBANA_PASS" \
                      jq '.data.password = env.B64P' | \
                      kubectl apply -f - || { echo "ERROR: Failed to update dashboard-credentials"; exit 1; }

                    # Update filebeat credentials
                    kubectl get secret "${FULLNAME}-filebeat-credentials" -n "$NAMESPACE" -o json | \
                      B64P="$B64_FILEBEAT_PASS" \
                      jq '.data.password = env.B64P' | \
                      kubectl apply -f - || { echo "ERROR: Failed to update filebeat-credentials"; exit 1; }

                    echo "All K8s Secrets updated"

                  else
                    echo "ERROR: Unknown rotation mode: ${ROTATION_MODE}"
                    echo "Valid modes: vault, kubernetes"
                    exit 1
                  fi

                  # --- Step 3: Trigger rolling restart (only if Reloader is NOT enabled) ---
                  echo ""
                  echo "=== Step 3: Checking if manual restart is needed ==="

                  # Check if Reloader annotation exists on the indexer StatefulSet
                  RELOADER_ANNOTATION=$(kubectl get statefulset "${FULLNAME}-indexer" -n "$NAMESPACE" \
                    -o jsonpath='{.metadata.annotations.reloader\.stakater\.com/auto}' 2>/dev/null || echo "")

                  if [ "$RELOADER_ANNOTATION" = "true" ]; then
                    echo "Reloader is enabled — pods will restart automatically on Secret change"
                    echo "Waiting 30s for Reloader to detect changes and trigger restarts..."
                    sleep 30
                  else
                    echo "Reloader not detected — triggering manual rolling restart..."
                    kubectl rollout restart statefulset "${FULLNAME}-indexer" -n "$NAMESPACE"
                    kubectl rollout restart statefulset "${FULLNAME}-manager" -n "$NAMESPACE"
                    kubectl rollout restart deployment "${FULLNAME}-dashboard" -n "$NAMESPACE"
                    echo "Rolling restart triggered for indexer, manager, dashboard"
                  fi

                  # --- Step 4: Health check ---
                  if [ "$HEALTH_CHECK_ENABLED" = "true" ]; then
                    echo ""
                    echo "=== Step 4: Verifying cluster health ==="
                    echo "Waiting for pods to be Ready (timeout: ${HEALTH_CHECK_TIMEOUT}s)..."

                    # Wait for indexer rollout
                    kubectl rollout status statefulset "${FULLNAME}-indexer" -n "$NAMESPACE" \
                      --timeout="${HEALTH_CHECK_TIMEOUT}s" || { echo "WARNING: Indexer rollout did not complete in time"; }

                    # Wait for manager rollout
                    kubectl rollout status statefulset "${FULLNAME}-manager" -n "$NAMESPACE" \
                      --timeout="${HEALTH_CHECK_TIMEOUT}s" || { echo "WARNING: Manager rollout did not complete in time"; }

                    # Check OpenSearch cluster health
                    echo "Checking OpenSearch cluster health..."
                    ATTEMPTS=0
                    MAX_ATTEMPTS=$((HEALTH_CHECK_TIMEOUT / 10))
                    while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                      HEALTH=$(kubectl exec "${FULLNAME}-indexer-0" -n "$NAMESPACE" -- \
                        curl -sk -u "admin:${NEW_ADMIN_PASS}" \
                        "https://localhost:9200/_cluster/health?format=json" 2>/dev/null | \
                        grep -o '"status":"[^"]*"' | cut -d'"' -f4) || true

                      if [ "$HEALTH" = "green" ]; then
                        echo "OpenSearch cluster status: GREEN"
                        break
                      fi
                      ATTEMPTS=$((ATTEMPTS + 1))
                      echo "Attempt ${ATTEMPTS}/${MAX_ATTEMPTS} — cluster status: ${HEALTH:-unknown}, retrying in 10s..."
                      sleep 10
                    done

                    if [ "$HEALTH" != "green" ]; then
                      echo "WARNING: Cluster did not reach GREEN status (current: ${HEALTH:-unknown})"
                      echo "Credentials were rotated but cluster may need manual intervention"
                      exit 1
                    fi
                  fi

                  echo ""
                  echo "============================================"
                  echo "=== Credential rotation complete ==="
                  echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
                  echo "============================================"
{{- end }}
