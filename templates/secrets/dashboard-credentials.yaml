{{- if not .Values.security.existingSecrets.dashboard }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-dashboard-credentials
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.dashboard.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.security.kibanaserverPassword | quote }}
{{- end }}
