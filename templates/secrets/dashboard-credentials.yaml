{{- if .Values.dashboard.enabled }}
{{- if not (or .Values.vault.enabled .Values.security.existingSecrets.dashboard) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-dashboard-credentials
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.dashboard.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ include "wazuh.kibanaserverPassword" . | quote }}
{{- end }}
{{- end }}
