{{- if not .Values.security.existingSecrets.api }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-api-credentials
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.manager.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.security.apiUsername | quote }}
  password: {{ .Values.security.apiPassword | quote }}
{{- end }}
