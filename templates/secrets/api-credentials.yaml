{{- if .Values.manager.enabled }}
{{- if not (or .Values.vault.enabled .Values.security.existingSecrets.api) }}
{{- $_ := required "security.adminPassword is required when vault.enabled=false and no existingSecrets.api is set" .Values.security.adminPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-api-credentials
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.manager.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  username: "wazuh-wui"
  password: {{ include "wazuh.apiPassword" . | quote }}
{{- end }}
{{- end }}
