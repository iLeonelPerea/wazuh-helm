{{- if .Values.manager.cluster.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-cluster-key
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.manager.selectorLabels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.manager.cluster.key }}
  key: {{ .Values.manager.cluster.key | b64enc | quote }}
  {{- else }}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-cluster-key" (include "wazuh.fullname" .))) }}
  {{- if $existingSecret }}
  key: {{ index $existingSecret.data "key" }}
  {{- else }}
  key: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
