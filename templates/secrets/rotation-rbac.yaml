{{- if and .Values.credentialRotation.enabled (not (and .Values.vault.enabled (eq .Values.credentialRotation.mode "vault"))) }}
{{- /* When vault.enabled=true AND mode=vault, RBAC is handled by vault/credential-rotation.yaml */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
rules:
  # Read and update secrets for credential rotation
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "update", "patch"]
  # Force-sync ExternalSecrets from Vault during rotation
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "patch"]
  # Rollout restart StatefulSets and Deployments after rotation
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "list", "watch", "patch"]
  # Check pod status for health verification
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Exec into indexer pods for health checks
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "wazuh.fullname" . }}-credential-rotation
subjects:
  - kind: ServiceAccount
    name: {{ include "wazuh.fullname" . }}-credential-rotation
    namespace: {{ .Release.Namespace }}
{{- if eq .Values.credentialRotation.mode "vault" }}
---
# Role for Vault pod access in vault namespace (vault mode only)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation-vault
  namespace: {{ .Values.vault.namespace | default "vault" }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
rules:
  # Get/list Vault pods in vault namespace
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Exec into Vault pod to write KV secrets
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation-vault
  namespace: {{ .Values.vault.namespace | default "vault" }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "wazuh.fullname" . }}-credential-rotation-vault
subjects:
  - kind: ServiceAccount
    name: {{ include "wazuh.fullname" . }}-credential-rotation
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
