{{- if .Values.indexer.enabled }}
{{- if not (or .Values.vault.enabled .Values.security.existingSecrets.indexer) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-indexer-credentials
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.indexer.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  username: "admin"
  password: {{ required "security.adminPassword is required when vault.enabled=false and no existingSecrets.indexer is set" .Values.security.adminPassword | quote }}
{{- end }}
{{- end }}
