{{- if .Values.manager.enabled }}
{{- if not (or .Values.vault.enabled .Values.security.existingSecrets.filebeat) }}
{{- $_ := required "security.adminPassword is required when vault.enabled=false and no existingSecrets.filebeat is set" .Values.security.adminPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-filebeat-credentials
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ include "wazuh.filebeatPassword" . | quote }}
{{- end }}
{{- end }}
