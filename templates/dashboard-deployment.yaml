apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wazuh.fullname" . }}-dashboard
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.dashboard.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "wazuh.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wazuh.labels" . | nindent 8 }}
        {{- include "wazuh.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: wazuh-dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: dashboard
              containerPort: 5601
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
            - name: INDEXER_URL
              value: "https://{{ include "wazuh.fullname" . }}-indexer:9200"
            - name: INDEXER_USERNAME
              value: "kibanaserver"
            - name: INDEXER_PASSWORD
              value: {{ .Values.security.kibanaserverPassword | quote }}
            - name: DASHBOARD_USERNAME
              value: "kibanaserver"
            - name: DASHBOARD_PASSWORD
              value: {{ .Values.security.kibanaserverPassword | quote }}
            - name: WAZUH_API_URL
              value: "https://{{ include "wazuh.fullname" . }}-manager"
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-credentials
                  key: api-username
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-credentials
                  key: api-password
            - name: SERVER_SSL_ENABLED
              value: "false"
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          volumeMounts:
            - name: dashboard-config
              mountPath: /usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
              readOnly: true
            - name: dashboard-certs
              mountPath: /usr/share/wazuh-dashboard/certs
              readOnly: true
      volumes:
        - name: dashboard-config
          configMap:
            name: {{ include "wazuh.fullname" . }}-dashboard-config
        - name: dashboard-certs
          secret:
            secretName: {{ include "wazuh.fullname" . }}-dashboard-certs
