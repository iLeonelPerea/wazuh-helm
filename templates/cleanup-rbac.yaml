{{- if .Values.cleanup.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wazuh.fullname" . }}-cleanup
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "wazuh.fullname" . }}-cleanup
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "wazuh.fullname" . }}-cleanup
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "wazuh.fullname" . }}-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ include "wazuh.fullname" . }}-cleanup
    namespace: {{ .Release.Namespace }}
{{- end }}
