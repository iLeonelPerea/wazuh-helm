apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ include "wazuh.fullname" . }}-critical
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
globalDefault: false
# High priority but below system-cluster-critical (2000000000)
value: 1000000
preemptionPolicy: PreemptLowerPriority
description: "Priority class for Wazuh SIEM components"
