{{- if and .Values.vault.enabled .Values.vault.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wazuh.fullname" . }}-vault-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "wazuh.labels" . | nindent 8 }}
        app.kubernetes.io/component: vault-bootstrap
    spec:
      serviceAccountName: {{ include "wazuh.fullname" . }}-vault-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: "{{ .Values.vault.bootstrap.image.repository }}:{{ .Values.vault.bootstrap.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            {{- toYaml .Values.vault.bootstrap.resources | nindent 12 }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_SKIP_VERIFY
              value: {{ .Values.vault.tlsSkipVerify | quote }}
            - name: VAULT_MOUNT
              value: {{ .Values.vault.mount | quote }}
            - name: VAULT_AUTH_PATH
              value: {{ .Values.vault.authPath | quote }}
            - name: VAULT_ROLE
              value: {{ .Values.vault.role | quote }}
            - name: WAZUH_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: WAZUH_SA
              value: {{ .Values.vault.serviceAccount | quote }}
            - name: READ_ADMIN_FROM_VAULT
              value: {{ .Values.vault.readAdminPasswordFromVault | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vault-token
              mountPath: /var/run/secrets/vault
              readOnly: true
            {{- if not .Values.vault.readAdminPasswordFromVault }}
            - name: admin-password
              mountPath: /var/run/secrets/wazuh
              readOnly: true
            {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # Read secrets from mounted files (never exposed as env vars)
              VAULT_TOKEN=$(cat /var/run/secrets/vault/token)
              # Read admin password from either mounted Secret or Vault KV
              if [ "$READ_ADMIN_FROM_VAULT" = "true" ]; then
                echo "Reading admin password from Vault KV..."
                VAULT_RESP=$(vault_api GET "$VAULT_MOUNT/data/admin-password")
                ADMIN_PASSWORD=$(echo "$VAULT_RESP" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')
                if [ -z "$ADMIN_PASSWORD" ]; then
                  echo "ERROR: Could not read admin password from Vault at $VAULT_MOUNT/data/admin-password"
                  echo "Make sure to seed it first: vault kv put $VAULT_MOUNT/admin-password value=YOUR_PASSWORD (KV v2 API path: $VAULT_MOUNT/data/admin-password)"
                  exit 1
                fi
                echo "Admin password read from Vault"
              else
                ADMIN_PASSWORD=$(cat /var/run/secrets/wazuh/password)
                echo "Admin password read from Helm values"
              fi

              echo "======================================================"
              echo "=== Wazuh Vault Bootstrap ==="
              echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
              echo "======================================================"

              # --- Set TLS options based on VAULT_SKIP_VERIFY ---
              if [ "$VAULT_SKIP_VERIFY" = "true" ]; then
                WGET_TLS="--no-check-certificate"
                echo "WARNING: TLS verification disabled (VAULT_SKIP_VERIFY=true)"
              else
                WGET_TLS=""
              fi

              # --- Helper: wget-based HTTP calls (alpine has wget, not curl) ---
              vault_api() {
                METHOD="$1"
                URL_PATH="$2"
                DATA="$3"
                FULL_URL="$VAULT_ADDR/v1/$URL_PATH"
                WGET_OPTS="$WGET_TLS -q -O -"

                if [ "$METHOD" = "GET" ]; then
                  wget $WGET_OPTS --header="X-Vault-Token: $VAULT_TOKEN" "$FULL_URL" 2>/dev/null || echo '{"errors":["request_failed"]}'
                elif [ "$METHOD" = "POST" ] || [ "$METHOD" = "PUT" ]; then
                  echo "$DATA" > /tmp/payload.json
                  wget $WGET_OPTS --header="X-Vault-Token: $VAULT_TOKEN" --header="Content-Type: application/json" --post-file=/tmp/payload.json "$FULL_URL" 2>/dev/null || echo '{"errors":["request_failed"]}'
                  rm -f /tmp/payload.json
                fi
              }

              # --- Validate Vault is reachable ---
              echo ""
              echo "=== Validating Vault connectivity ==="
              HEALTH=$(wget $WGET_TLS -q -O - "$VAULT_ADDR/v1/sys/health" 2>/dev/null || echo "FAIL")
              if [ "$HEALTH" = "FAIL" ]; then
                echo "ERROR: Cannot reach Vault at $VAULT_ADDR"
                exit 1
              fi
              echo "Vault reachable"

              # --- Derive internal passwords (same logic as _helpers.tpl) ---
              KIBANA_PASS=$(printf "%s-kibanaserver" "$ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1 | cut -c1-20)"!1A"
              FILEBEAT_PASS=$(printf "%s-filebeat" "$ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1 | cut -c1-20)"!1A"
              API_PASS=$(printf "%s-api" "$ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1 | cut -c1-20)"!1A"
              echo "Derived passwords from admin password"

              # --- Step 1: Enable KV v2 (idempotent) ---
              echo ""
              echo "=== Step 1: Enable KV v2 at $VAULT_MOUNT ==="
              MOUNTS=$(vault_api GET "sys/mounts")
              if echo "$MOUNTS" | grep -q "\"${VAULT_MOUNT}/"; then
                echo "KV v2 already exists at $VAULT_MOUNT (skipping)"
              else
                RESULT=$(vault_api POST "sys/mounts/$VAULT_MOUNT" '{"type":"kv","options":{"version":"2"},"description":"Wazuh credentials"}')
                if echo "$RESULT" | grep -q "errors"; then
                  echo "ERROR enabling KV v2: $RESULT"
                  exit 1
                fi
                echo "KV v2 mounted at $VAULT_MOUNT"
              fi

              # --- Step 2: Seed credentials ---
              echo ""
              echo "=== Step 2: Seed credentials in Vault KV ==="

              vault_api POST "$VAULT_MOUNT/data/indexer-credentials" \
                "{\"data\":{\"username\":\"admin\",\"password\":\"$ADMIN_PASSWORD\"}}" > /dev/null
              echo "indexer-credentials written"

              vault_api POST "$VAULT_MOUNT/data/api-credentials" \
                "{\"data\":{\"username\":\"wazuh-wui\",\"password\":\"$API_PASS\"}}" > /dev/null
              echo "api-credentials written"

              vault_api POST "$VAULT_MOUNT/data/dashboard-credentials" \
                "{\"data\":{\"password\":\"$KIBANA_PASS\"}}" > /dev/null
              echo "dashboard-credentials written"

              vault_api POST "$VAULT_MOUNT/data/filebeat-credentials" \
                "{\"data\":{\"password\":\"$FILEBEAT_PASS\"}}" > /dev/null
              echo "filebeat-credentials written"

              # --- Step 3: Enable K8s auth (idempotent) ---
              echo ""
              echo "=== Step 3: Enable Kubernetes auth ==="
              AUTH_CHECK=$(vault_api GET "sys/auth")
              if echo "$AUTH_CHECK" | grep -q "\"${VAULT_AUTH_PATH}/"; then
                echo "Kubernetes auth already enabled (skipping)"
              else
                RESULT=$(vault_api POST "sys/auth/$VAULT_AUTH_PATH" '{"type":"kubernetes","description":"K8s auth for Wazuh ESO"}')
                if echo "$RESULT" | grep -q "errors"; then
                  echo "ERROR enabling K8s auth: $RESULT"
                  exit 1
                fi
                echo "Kubernetes auth enabled at $VAULT_AUTH_PATH"
              fi

              # --- Step 4: Configure K8s auth ---
              echo ""
              echo "=== Step 4: Configure Kubernetes auth ==="
              K8S_HOST="https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT"
              # Escape newlines in CA cert for JSON embedding
              SA_CA_CERT=$(awk 'NR>1{printf "\\n"}{printf "%s",$0}' /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)

              # NOTE: We do NOT pass token_reviewer_jwt — Vault uses its own SA token
              # for TokenReview API calls (requires system:auth-delegator binding on Vault SA)
              printf '{"kubernetes_host":"%s","kubernetes_ca_cert":"%s"}' \
                "$K8S_HOST" "$SA_CA_CERT" > /tmp/k8s-auth-config.json

              RESULT=$(wget $WGET_TLS -q -O - \
                --header="X-Vault-Token: $VAULT_TOKEN" \
                --header="Content-Type: application/json" \
                --post-file=/tmp/k8s-auth-config.json \
                "$VAULT_ADDR/v1/auth/$VAULT_AUTH_PATH/config" 2>&1 || true)
              rm -f /tmp/k8s-auth-config.json

              # Verify the config was written
              VERIFY=$(wget $WGET_TLS -q -O - \
                --header="X-Vault-Token: $VAULT_TOKEN" \
                "$VAULT_ADDR/v1/auth/$VAULT_AUTH_PATH/config" 2>/dev/null || echo "VERIFY_FAIL")
              if echo "$VERIFY" | grep -q "kubernetes_host"; then
                echo "Kubernetes auth configured with host $K8S_HOST"
              else
                echo "ERROR: Kubernetes auth config verification failed"
                echo "POST result: $RESULT"
                exit 1
              fi

              # --- Step 5: Create policy (idempotent) ---
              echo ""
              echo "=== Step 5: Create Wazuh policy ==="
              vault_api PUT "sys/policies/acl/wazuh-eso-read" \
                "{\"policy\":\"path \\\"${VAULT_MOUNT}/data/*\\\" { capabilities = [\\\"read\\\", \\\"list\\\"] }\"}" > /dev/null
              echo "Policy wazuh-eso-read created"

              # --- Step 6: Create auth role (idempotent) ---
              echo ""
              echo "=== Step 6: Create Kubernetes auth role ==="
              vault_api POST "auth/$VAULT_AUTH_PATH/role/$VAULT_ROLE" \
                "{\"bound_service_account_names\":\"$WAZUH_SA\",\"bound_service_account_namespaces\":\"$WAZUH_NAMESPACE\",\"policies\":\"wazuh-eso-read\",\"ttl\":\"1h\"}" > /dev/null
              echo "Auth role $VAULT_ROLE created"

              # Clear sensitive variables
              unset VAULT_TOKEN
              unset ADMIN_PASSWORD

              echo ""
              echo "======================================================"
              echo "=== Bootstrap complete ==="
              echo "======================================================"
      volumes:
        - name: tmp
          emptyDir: {}
        - name: vault-token
          secret:
            secretName: {{ include "wazuh.fullname" . }}-vault-bootstrap-token
            items:
              - key: token
                path: token
        {{- if not .Values.vault.readAdminPasswordFromVault }}
        - name: admin-password
          secret:
            secretName: {{ include "wazuh.fullname" . }}-vault-bootstrap-password
            items:
              - key: adminPassword
                path: password
        {{- end }}
{{- end }}
