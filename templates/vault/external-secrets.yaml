{{- if .Values.vault.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "wazuh.fullname" . }}-indexer-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer
spec:
  refreshInterval: {{ .Values.vault.refreshInterval }}
  secretStoreRef:
    name: {{ include "wazuh.fullname" . }}-vault-store
    kind: ClusterSecretStore
  target:
    name: {{ include "wazuh.fullname" . }}-indexer-credentials
    deletionPolicy: {{ .Values.vault.deletionPolicy }}
  data:
    - secretKey: username
      remoteRef:
        key: indexer-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: indexer-credentials
        property: password
