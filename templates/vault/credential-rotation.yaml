{{- if and .Values.credentialRotation.enabled .Values.vault.enabled (eq .Values.credentialRotation.mode "vault") }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-rotation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-rotation
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-rotation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "wazuh.fullname" . }}-credential-rotation
subjects:
  - kind: ServiceAccount
    name: {{ include "wazuh.fullname" . }}-credential-rotation
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "wazuh.fullname" . }}-credential-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-rotation
spec:
  schedule: {{ .Values.credentialRotation.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "wazuh.labels" . | nindent 12 }}
            app.kubernetes.io/component: credential-rotation
        spec:
          serviceAccountName: {{ include "wazuh.fullname" . }}-credential-rotation
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: rotate
              image: "{{ .Values.credentialRotation.image.repository }}:{{ .Values.credentialRotation.image.tag }}"
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                {{- toYaml .Values.credentialRotation.resources | nindent 16 }}
              env:
                - name: VAULT_ADDR
                  value: {{ .Values.vault.address | quote }}
                - name: VAULT_SKIP_VERIFY
                  value: {{ .Values.vault.tlsSkipVerify | quote }}
                - name: VAULT_MOUNT
                  value: {{ .Values.vault.mount | quote }}
                - name: VAULT_AUTH_PATH
                  value: {{ .Values.vault.authPath | quote }}
                - name: VAULT_ROLE
                  value: "wazuh-rotation"
                - name: WAZUH_NAMESPACE
                  value: {{ .Release.Namespace | quote }}
                - name: ESO_SYNC_WAIT
                  value: {{ .Values.credentialRotation.esoSyncWaitSeconds | quote }}
                - name: HEALTH_CHECK_ENABLED
                  value: {{ .Values.credentialRotation.healthCheck.enabled | quote }}
                - name: HEALTH_CHECK_TIMEOUT
                  value: {{ .Values.credentialRotation.healthCheck.timeoutSeconds | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "======================================================"
                  echo "=== Wazuh Credential Rotation ==="
                  echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
                  echo "======================================================"

                  # --- TLS options ---
                  if [ "$VAULT_SKIP_VERIFY" = "true" ]; then
                    CURL_TLS="--insecure"
                  else
                    CURL_TLS=""
                  fi

                  # --- Authenticate to Vault via K8s auth ---
                  echo ""
                  echo "=== Authenticating to Vault via Kubernetes auth ==="
                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  LOGIN_PAYLOAD="{\"jwt\":\"$SA_TOKEN\",\"role\":\"$VAULT_ROLE\"}"

                  LOGIN_RESP=$(curl $CURL_TLS -s \
                    -H "Content-Type: application/json" \
                    -d "$LOGIN_PAYLOAD" \
                    "$VAULT_ADDR/v1/auth/$VAULT_AUTH_PATH/login" 2>/dev/null || echo '{"errors":["login_failed"]}')

                  VAULT_TOKEN=$(echo "$LOGIN_RESP" | sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')
                  if [ -z "$VAULT_TOKEN" ]; then
                    echo "ERROR: Failed to authenticate to Vault"
                    echo "Ensure role '$VAULT_ROLE' exists with write permissions on $VAULT_MOUNT/data/*"
                    exit 1
                  fi
                  echo "Authenticated to Vault"

                  # --- Helper function (uses curl, available in bitnami/kubectl) ---
                  vault_api() {
                    METHOD="$1"
                    URL_PATH="$2"
                    DATA="$3"
                    FULL_URL="$VAULT_ADDR/v1/$URL_PATH"

                    if [ "$METHOD" = "GET" ]; then
                      curl $CURL_TLS -s -H "X-Vault-Token: $VAULT_TOKEN" "$FULL_URL" 2>/dev/null || echo '{"errors":["request_failed"]}'
                    elif [ "$METHOD" = "POST" ] || [ "$METHOD" = "PUT" ]; then
                      curl $CURL_TLS -s -X "$METHOD" -H "X-Vault-Token: $VAULT_TOKEN" -H "Content-Type: application/json" -d "$DATA" "$FULL_URL" 2>/dev/null || echo '{"errors":["request_failed"]}'
                    fi
                  }

                  # --- Step 1: Read admin password from Vault ---
                  echo ""
                  echo "=== Step 1: Reading admin password from Vault ==="
                  VAULT_RESP=$(vault_api GET "$VAULT_MOUNT/data/admin-password")
                  ADMIN_PASSWORD=$(echo "$VAULT_RESP" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')
                  if [ -z "$ADMIN_PASSWORD" ]; then
                    echo "ERROR: Could not read admin password from Vault at $VAULT_MOUNT/data/admin-password"
                    echo "Seed it first: vault kv put $VAULT_MOUNT/admin-password value=YOUR_PASSWORD"
                    exit 1
                  fi
                  echo "Admin password read successfully"

                  # --- Step 2: Derive new passwords (same logic as bootstrap) ---
                  echo ""
                  echo "=== Step 2: Deriving credentials ==="
                  KIBANA_PASS=$(printf "%s-kibanaserver" "$ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1 | cut -c1-20)"!1A"
                  FILEBEAT_PASS=$(printf "%s-filebeat" "$ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1 | cut -c1-20)"!1A"
                  API_PASS=$(printf "%s-api" "$ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1 | cut -c1-20)"!1A"
                  echo "Passwords derived"

                  # --- Step 3: Write derived credentials to Vault ---
                  echo ""
                  echo "=== Step 3: Writing credentials to Vault ==="
                  vault_api POST "$VAULT_MOUNT/data/indexer-credentials" \
                    "{\"data\":{\"username\":\"admin\",\"password\":\"$ADMIN_PASSWORD\"}}" > /dev/null
                  echo "indexer-credentials updated"

                  vault_api POST "$VAULT_MOUNT/data/api-credentials" \
                    "{\"data\":{\"username\":\"wazuh-wui\",\"password\":\"$API_PASS\"}}" > /dev/null
                  echo "api-credentials updated"

                  vault_api POST "$VAULT_MOUNT/data/dashboard-credentials" \
                    "{\"data\":{\"password\":\"$KIBANA_PASS\"}}" > /dev/null
                  echo "dashboard-credentials updated"

                  vault_api POST "$VAULT_MOUNT/data/filebeat-credentials" \
                    "{\"data\":{\"password\":\"$FILEBEAT_PASS\"}}" > /dev/null
                  echo "filebeat-credentials updated"

                  # --- Step 4: Force ESO to re-sync ---
                  echo ""
                  echo "=== Step 4: Forcing ESO re-sync ==="
                  TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
                  for ES_NAME in indexer-credentials api-credentials dashboard-credentials filebeat-credentials; do
                    kubectl annotate externalsecret "{{ include "wazuh.fullname" . }}-${ES_NAME}" \
                      -n "$WAZUH_NAMESPACE" \
                      --overwrite \
                      force-sync="$TIMESTAMP" 2>/dev/null && echo "Annotated $ES_NAME" || echo "WARN: Could not annotate $ES_NAME"
                  done

                  # --- Step 5: Wait for ESO sync ---
                  echo ""
                  echo "=== Step 5: Waiting ${ESO_SYNC_WAIT}s for ESO sync ==="
                  ELAPSED=0
                  while [ "$ELAPSED" -lt "$ESO_SYNC_WAIT" ]; do
                    SYNCED=0
                    for ES_NAME in indexer-credentials api-credentials dashboard-credentials filebeat-credentials; do
                      STATUS=$(kubectl get externalsecret "{{ include "wazuh.fullname" . }}-${ES_NAME}" \
                        -n "$WAZUH_NAMESPACE" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)
                      if [ "$STATUS" = "True" ]; then
                        SYNCED=$((SYNCED + 1))
                      fi
                    done
                    if [ "$SYNCED" -eq 4 ]; then
                      echo "All 4 ExternalSecrets synced"
                      break
                    fi
                    echo "Waiting... ($SYNCED/4 synced, ${ELAPSED}s elapsed)"
                    sleep 10
                    ELAPSED=$((ELAPSED + 10))
                  done

                  {{- if .Values.credentialRotation.healthCheck.enabled }}
                  # --- Step 6: Verify OpenSearch health ---
                  echo ""
                  echo "=== Step 6: Verifying OpenSearch cluster health ==="
                  INDEXER_SVC="{{ include "wazuh.fullname" . }}-indexer.{{ .Release.Namespace }}.svc.cluster.local"
                  # Use netrc file to avoid password in /proc/cmdline
                  printf "machine %s\nlogin admin\npassword %s\n" "$INDEXER_SVC" "$ADMIN_PASSWORD" > /tmp/.netrc
                  chmod 600 /tmp/.netrc
                  ELAPSED=0
                  while [ "$ELAPSED" -lt "$HEALTH_CHECK_TIMEOUT" ]; do
                    HEALTH=$(curl --insecure -s --netrc-file /tmp/.netrc \
                      "https://$INDEXER_SVC:9200/_cluster/health" 2>/dev/null || echo "FAIL")
                    if echo "$HEALTH" | grep -q '"status":"green"'; then
                      echo "OpenSearch cluster is GREEN"
                      break
                    fi
                    echo "Cluster not green yet (${ELAPSED}s/${HEALTH_CHECK_TIMEOUT}s)..."
                    sleep 15
                    ELAPSED=$((ELAPSED + 15))
                  done
                  if [ "$ELAPSED" -ge "$HEALTH_CHECK_TIMEOUT" ]; then
                    echo "WARNING: Cluster did not reach GREEN within ${HEALTH_CHECK_TIMEOUT}s"
                    echo "Last health response: $HEALTH"
                  fi
                  rm -f /tmp/.netrc
                  {{- end }}

                  # Clear sensitive vars
                  unset VAULT_TOKEN ADMIN_PASSWORD

                  echo ""
                  echo "======================================================"
                  echo "=== Credential rotation complete ==="
                  echo "======================================================"
{{- end }}
