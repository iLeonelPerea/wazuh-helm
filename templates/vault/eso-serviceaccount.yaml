{{- if .Values.vault.enabled }}
# ServiceAccount used by ClusterSecretStore for Vault K8s auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.vault.serviceAccount }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-eso
{{- end }}
