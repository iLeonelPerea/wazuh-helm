{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ include "wazuh.fullname" . }}-vault-store
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-eso
spec:
  provider:
    vault:
      server: {{ .Values.vault.address | quote }}
      path: {{ .Values.vault.mount | quote }}
      version: "v2"
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.authPath | quote }}
          role: {{ .Values.vault.role | quote }}
          serviceAccountRef:
            name: {{ .Values.vault.serviceAccount }}
            namespace: {{ .Release.Namespace }}
{{- end }}
