{{- if and .Values.vault.enabled .Values.vault.bootstrap.enabled }}
# Bootstrap token - used by the bootstrap job to authenticate to Vault API
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-vault-bootstrap-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
type: Opaque
stringData:
  token: {{ required "vault.bootstrapToken is required when vault.enabled=true" .Values.vault.bootstrapToken | quote }}
---
# Admin password - used by bootstrap job to derive and seed all credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh.fullname" . }}-vault-bootstrap-password
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
type: Opaque
stringData:
  adminPassword: {{ .Values.security.adminPassword | quote }}
{{- end }}
