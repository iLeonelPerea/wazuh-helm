{{/*
  Index patterns init job - DISABLED
  The dashboard creates index patterns automatically on first login.
  This job was causing helm install timeouts due to post-install hook.
  Uncomment if manual index pattern creation is needed.
*/}}
{{- if false }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wazuh.fullname" . }}-indexer-init
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "wazuh.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-index-patterns
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              INDEXER_URL="https://{{ include "wazuh.fullname" . }}-indexer:9200"
              CA_CERT="/certs/root-ca.pem"
              AUTH="admin:${INDEXER_PASSWORD}"

              echo "Waiting for indexer to be ready..."
              until curl -sf --cacert "$CA_CERT" -u "$AUTH" "$INDEXER_URL/_cluster/health" > /dev/null 2>&1; do
                echo "Indexer not ready, retrying in 5s..."
                sleep 5
              done
              echo "Indexer is ready. Creating index patterns in .kibana..."

              for PATTERN in wazuh-alerts-* wazuh-monitoring-* wazuh-statistics-*; do
                echo "Creating index pattern: $PATTERN"
                curl -sf --cacert "$CA_CERT" -u "$AUTH" \
                  -X PUT "$INDEXER_URL/.kibana/_doc/index-pattern:${PATTERN}" \
                  -H 'Content-Type: application/json' \
                  -d "{
                    \"type\": \"index-pattern\",
                    \"index-pattern\": {
                      \"title\": \"${PATTERN}\",
                      \"timeFieldName\": \"timestamp\"
                    },
                    \"migrationVersion\": {
                      \"index-pattern\": \"7.6.0\"
                    },
                    \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
                  }" || true
              done
              echo "Index patterns created successfully."
          env:
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-credentials
                  key: indexer-password
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: {{ include "wazuh.fullname" . }}-indexer-certs
{{- end }}
