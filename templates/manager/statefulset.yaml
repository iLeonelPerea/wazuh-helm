apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "wazuh.fullname" . }}-manager
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.manager.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "wazuh.fullname" . }}-manager
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      {{- include "wazuh.manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wazuh.labels" . | nindent 8 }}
        {{- include "wazuh.manager.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.vault.enabled }}
        {{- include "wazuh.vaultAnnotations" . | nindent 8 }}
        {{- end }}
        {{- include "wazuh.checksumAnnotations" . | nindent 8 }}
        {{- if .Values.manager.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.manager.metrics.port | quote }}
        prometheus.io/path: {{ .Values.manager.metrics.path | quote }}
        prometheus.io/scheme: "https"
        {{- end }}
    spec:
      {{- if .Values.vault.enabled }}
      serviceAccountName: {{ include "wazuh.fullname" . }}-vault
      {{- else }}
      serviceAccountName: {{ include "wazuh.fullname" . }}-manager
      {{- end }}
      {{- include "wazuh.dnsConfig" . | nindent 6 }}
      priorityClassName: {{ include "wazuh.fullname" . }}-critical
      terminationGracePeriodSeconds: {{ .Values.manager.terminationGracePeriodSeconds }}
      securityContext:
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.manager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.vault.enabled }}
        - name: vault-bridge
          image: "{{ .Values.global.initImages.kubectl.repository }}:{{ .Values.global.initImages.kubectl.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 65534
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Creating K8s secrets from Vault files ==="
              RELEASE="{{ include "wazuh.fullname" . }}"
              NS="{{ .Release.Namespace }}"

              INDEXER_USER=$(grep '^username=' /vault/secrets/indexer-credentials | cut -d= -f2)
              INDEXER_PASS=$(grep '^password=' /vault/secrets/indexer-credentials | cut -d= -f2)
              API_USER=$(grep '^username=' /vault/secrets/api-credentials | cut -d= -f2)
              API_PASS=$(grep '^password=' /vault/secrets/api-credentials | cut -d= -f2)
              DASH_PASS=$(grep '^password=' /vault/secrets/dashboard-credentials | cut -d= -f2)
              FB_PASS=$(grep '^password=' /vault/secrets/filebeat-credentials | cut -d= -f2)

              for var in INDEXER_USER INDEXER_PASS API_USER API_PASS DASH_PASS FB_PASS; do
                eval val=\$$var
                if [ -z "$val" ]; then echo "ERROR: $var empty"; exit 1; fi
              done

              kubectl create secret generic ${RELEASE}-indexer-credentials \
                --from-literal=username="$INDEXER_USER" --from-literal=password="$INDEXER_PASS" \
                -n $NS --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic ${RELEASE}-api-credentials \
                --from-literal=username="$API_USER" --from-literal=password="$API_PASS" \
                -n $NS --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic ${RELEASE}-dashboard-credentials \
                --from-literal=password="$DASH_PASS" \
                -n $NS --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic ${RELEASE}-filebeat-credentials \
                --from-literal=password="$FB_PASS" \
                -n $NS --dry-run=client -o yaml | kubectl apply -f -

              for s in indexer-credentials api-credentials dashboard-credentials filebeat-credentials; do
                kubectl label secret ${RELEASE}-${s} -n $NS vault-source=true --overwrite 2>/dev/null || true
              done
              echo "=== Vault bridge complete ==="
        {{- end }}
        - name: wait-for-indexer
          image: "{{ .Values.global.initImages.busybox.repository }}:{{ .Values.global.initImages.busybox.tag }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for indexer to be ready on port 9200..."
              MAX_ATTEMPTS=120
              ATTEMPT=0
              INDEXER_HOST="{{ include "wazuh.fullname" . }}-indexer.{{ .Release.Namespace }}.svc.cluster.local"
              while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                if nc -zw2 $INDEXER_HOST 9200 2>/dev/null; then
                  echo "Indexer is ready!"
                  exit 0
                fi
                ATTEMPT=$((ATTEMPT + 1))
                echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Indexer not ready, retrying in 5s..."
                sleep 5
              done
              echo "ERROR: Indexer did not become ready after 600 seconds"
              exit 1
        - name: inject-filebeat-config
          image: "{{ .Values.global.initImages.busybox.repository }}:{{ .Values.global.initImages.busybox.tag }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - /bin/sh
            - -c
            - |
              cp /config-template/filebeat.yml /filebeat-config/filebeat.yml
              # Replace indexer FQDN with ClusterIP from auto-injected env var (zero DNS)
              if [ -n "$WAZUH_INDEXER_SERVICE_HOST" ]; then
                sed -i "s|__INDEXER_HOST__|${WAZUH_INDEXER_SERVICE_HOST}|g" /filebeat-config/filebeat.yml
              fi
              echo "Filebeat config prepared"
          volumeMounts:
            - name: manager-config
              mountPath: /config-template
              readOnly: true
            - name: filebeat-config
              mountPath: /filebeat-config
      containers:
        - name: wazuh-manager
          image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}"
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - KILL
                - NET_BIND_SERVICE
                - NET_RAW
                - SETGID
                - SETUID
                - SYS_CHROOT
          ports:
            - name: agents-events
              containerPort: 1514
              protocol: TCP
            - name: agents-auth
              containerPort: 1515
              protocol: TCP
            - name: cluster
              containerPort: 1516
              protocol: TCP
            - name: api
              containerPort: 55000
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
            - name: INDEXER_URL
              value: "https://{{ include "wazuh.indexer.host" . }}:9200"
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.indexerSecretName" . }}
                  key: username
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.indexerSecretName" . }}
                  key: password
            - name: FILEBEAT_USERNAME
              value: "filebeat_internal"
            - name: FILEBEAT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.filebeatSecretName" . }}
                  key: password
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: "certificate"
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: "/etc/ssl/root-ca.pem"
            - name: SSL_CERTIFICATE
              value: "/etc/ssl/filebeat.pem"
            - name: SSL_KEY
              value: "/etc/ssl/filebeat-key.pem"
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.apiSecretName" . }}
                  key: username
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.apiSecretName" . }}
                  key: password
            {{- if .Values.manager.cluster.enabled }}
            - name: WAZUH_CLUSTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-cluster-key
                  key: key
            {{- end }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    # Wait for shared directory to exist (created by manager init)
                    for i in $(seq 1 30); do
                      [ -d /var/ossec/etc/shared/default ] && break
                      sleep 2
                    done
                    {{- if .Values.agent.enabled }}
                    # Copy SIEM-only agent.conf from ConfigMap
                    if [ -f /tmp/shared-config/agent.conf ]; then
                      cp /tmp/shared-config/agent.conf /var/ossec/etc/shared/default/agent.conf
                      chown wazuh:wazuh /var/ossec/etc/shared/default/agent.conf 2>/dev/null || true
                    fi
                    {{- end }}
                    {{- if .Values.manager.agentGroups }}
                    # Create agent group directories and copy configs
                    {{- range $groupName, $groupConfig := .Values.manager.agentGroups }}
                    mkdir -p /var/ossec/etc/shared/{{ $groupName }}
                    if [ -f /tmp/agent-groups/{{ $groupName }}-agent.conf ]; then
                      cp /tmp/agent-groups/{{ $groupName }}-agent.conf /var/ossec/etc/shared/{{ $groupName }}/agent.conf
                      chown -R wazuh:wazuh /var/ossec/etc/shared/{{ $groupName }} 2>/dev/null || true
                    fi
                    {{- end }}
                    {{- end }}
                    # Apply ossec.conf customizations (persisted on PVC)
                    CONF=/var/ossec/etc/ossec.conf
                    {{- if ne .Values.manager.feedUpdateInterval "60m" }}
                    # feed-update-interval: {{ .Values.manager.feedUpdateInterval }} instead of default 60m
                    sed -i 's|<feed-update-interval>60m</feed-update-interval>|<feed-update-interval>{{ .Values.manager.feedUpdateInterval }}</feed-update-interval>|' $CONF 2>/dev/null || true
                    {{- end }}
                    {{- if .Values.manager.logallJson }}
                    # logall_json: yes for archives
                    sed -i 's|<logall_json>no</logall_json>|<logall_json>yes</logall_json>|' $CONF 2>/dev/null || true
                    {{- end }}
                    {{- if .Values.manager.cluster.enabled }}
                    # Configure cluster mode based on pod ordinal
                    # Note: $(hostname) binary doesn't exist in Wazuh image, use $HOSTNAME env var
                    ORDINAL=${HOSTNAME##*-}
                    if [ "$ORDINAL" = "0" ]; then
                      NODE_TYPE="master"
                      NODE_NAME="master-node"
                    else
                      NODE_TYPE="worker"
                      NODE_NAME="worker-${ORDINAL}"
                    fi
                    MASTER_ADDR="{{ include "wazuh.fullname" . }}-manager-0.{{ include "wazuh.fullname" . }}-manager.{{ .Release.Namespace }}.svc.cluster.local."
                    # Modify existing cluster block in ossec.conf (Wazuh image ships one with disabled=yes)
                    sed -i "s|<disabled>yes</disabled>|<disabled>no</disabled>|" $CONF 2>/dev/null || true
                    sed -i "s|<node_name>.*</node_name>|<node_name>${NODE_NAME}</node_name>|" $CONF 2>/dev/null || true
                    sed -i "s|<node_type>.*</node_type>|<node_type>${NODE_TYPE}</node_type>|" $CONF 2>/dev/null || true
                    sed -i "s|<key>.*</key>|<key>${WAZUH_CLUSTER_KEY}</key>|" $CONF 2>/dev/null || true
                    sed -i "s|<name>wazuh</name>|<name>{{ .Values.manager.cluster.name }}</name>|" $CONF 2>/dev/null || true
                    sed -i "s|<node>NODE_IP</node>|<node>${MASTER_ADDR}</node>|" $CONF 2>/dev/null || true
                    sed -i "s|<node>.*manager.*</node>|<node>${MASTER_ADDR}</node>|" $CONF 2>/dev/null || true
                    {{- end }}
                    # Disable osquery (not installed in container, generates warnings)
                    sed -i 's|<wodle name="osquery">|<wodle name="osquery">\n    <disabled>yes</disabled>|' $CONF 2>/dev/null || true
                    sed -i '/<wodle name="osquery">/,/<\/wodle>/{s|<disabled>no</disabled>|<disabled>yes</disabled>|}' $CONF 2>/dev/null || true
                    # Copy local_internal_options.conf for log rotation settings
                    if [ -f /tmp/manager-config/local_internal_options.conf ]; then
                      cp /tmp/manager-config/local_internal_options.conf /var/ossec/etc/local_internal_options.conf
                      chown wazuh:wazuh /var/ossec/etc/local_internal_options.conf 2>/dev/null || true
                    fi
                    # Copy custom detection rules
                    if [ -f /tmp/manager-config/local_rules.xml ]; then
                      cp /tmp/manager-config/local_rules.xml /var/ossec/etc/rules/local_rules.xml
                      chown wazuh:wazuh /var/ossec/etc/rules/local_rules.xml 2>/dev/null || true
                    fi
                    # Overwrite filebeat.yml from ConfigMap (PVC may have stale config)
                    if [ -f /tmp/manager-config/filebeat.yml ]; then
                      cp /tmp/manager-config/filebeat.yml /etc/filebeat/filebeat.yml
                      chown root:root /etc/filebeat/filebeat.yml 2>/dev/null || true
                    fi
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    # Graceful shutdown: let agents disconnect cleanly
                    echo "Stopping Wazuh manager gracefully..."
                    /var/ossec/bin/wazuh-control stop 2>/dev/null || true
                    sleep 5
          startupProbe:
            tcpSocket:
              port: agents-events
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: agents-events
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: agents-events
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          volumeMounts:
            - name: wazuh-manager-data
              mountPath: /var/ossec/data
            - name: wazuh-manager-data
              mountPath: /var/ossec/logs
              subPath: logs
            - name: wazuh-manager-data
              mountPath: /var/ossec/queue
              subPath: queue
            - name: wazuh-manager-data
              mountPath: /var/ossec/etc
              subPath: etc
            - name: filebeat-certs
              mountPath: /etc/ssl/root-ca.pem
              subPath: root-ca.pem
              readOnly: true
            - name: filebeat-certs
              mountPath: /etc/ssl/filebeat.pem
              subPath: filebeat.pem
              readOnly: true
            - name: filebeat-certs
              mountPath: /etc/ssl/filebeat-key.pem
              subPath: filebeat-key.pem
              readOnly: true
            {{- if .Values.agent.enabled }}
            - name: shared-config
              mountPath: /tmp/shared-config
              readOnly: true
            {{- end }}
            - name: filebeat-config
              mountPath: /etc/filebeat
            - name: manager-config
              mountPath: /tmp/manager-config
              readOnly: true
            {{- if .Values.manager.agentGroups }}
            - name: agent-groups-config
              mountPath: /tmp/agent-groups
              readOnly: true
            {{- end }}
        {{- if .Values.s3.enabled }}
        - name: s3-sync
          image: "{{ .Values.s3.image.repository }}:{{ .Values.s3.image.tag }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting S3 archive sync..."
              FAIL_COUNT=0
              MAX_FAILURES=10
              while true; do
                if [ -d /var/ossec/logs/archives ]; then
                  if aws s3 sync /var/ossec/logs/archives/ s3://{{ .Values.s3.bucket }}/archives/ \
                    --exclude "*.tmp" --exclude "*.lock" \
                    --region {{ .Values.s3.region }} --quiet 2>&1; then
                    echo "$(date) - Sync completed"
                    FAIL_COUNT=0
                  else
                    FAIL_COUNT=$((FAIL_COUNT + 1))
                    echo "$(date) - Sync FAILED ($FAIL_COUNT/$MAX_FAILURES)"
                    if [ $FAIL_COUNT -ge $MAX_FAILURES ]; then
                      echo "$(date) - FATAL: $MAX_FAILURES consecutive failures, exiting"
                      exit 1
                    fi
                  fi
                fi
                sleep {{ .Values.s3.syncIntervalSeconds }}
              done
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
          resources:
            {{- toYaml .Values.s3.resources | nindent 12 }}
          volumeMounts:
            - name: wazuh-manager-data
              mountPath: /var/ossec/logs
              subPath: logs
              readOnly: true
        {{- end }}
      volumes:
        - name: filebeat-certs
          secret:
            secretName: {{ include "wazuh.fullname" . }}-filebeat-certs
        {{- if .Values.agent.enabled }}
        - name: shared-config
          configMap:
            name: {{ include "wazuh.fullname" . }}-manager-shared
        {{- end }}
        - name: manager-config
          configMap:
            name: {{ include "wazuh.fullname" . }}-manager-config
        - name: filebeat-config
          emptyDir: {}
        {{- if .Values.manager.agentGroups }}
        - name: agent-groups-config
          configMap:
            name: {{ include "wazuh.fullname" . }}-agent-groups
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.manager.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.manager.storage.size }}
