{{- if gt (int .Values.manager.replicas) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "wazuh.fullname" . }}-manager
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  minAvailable: {{ sub (int .Values.manager.replicas) 1 }}
  selector:
    matchLabels:
      {{- include "wazuh.manager.selectorLabels" . | nindent 6 }}
{{- end }}
