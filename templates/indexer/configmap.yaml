{{- if .Values.indexer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wazuh.fullname" . }}-indexer-config
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.indexer.selectorLabels" . | nindent 4 }}
data:
  opensearch.yml: |
    network.host: "0.0.0.0"
    node.name: "${HOSTNAME}"
    {{- if gt (int .Values.indexer.replicas) 1 }}
    cluster.name: "wazuh-indexer-cluster"
    discovery.seed_hosts:
      {{- range $i := until (int .Values.indexer.replicas) }}
      - "{{ include "wazuh.fullname" $ }}-indexer-{{ $i }}.{{ include "wazuh.fullname" $ }}-indexer.{{ $.Release.Namespace }}.svc.cluster.local."
      {{- end }}
    cluster.initial_cluster_manager_nodes:
      {{- range $i := until (int .Values.indexer.replicas) }}
      - "{{ include "wazuh.fullname" $ }}-indexer-{{ $i }}"
      {{- end }}
    {{- else }}
    discovery.type: "single-node"
    {{- end }}
    bootstrap.memory_lock: false
    compatibility.override_main_response_version: true

    plugins.security.ssl.transport.pemcert_filepath: /usr/share/wazuh-indexer/config/certs/indexer.pem
    plugins.security.ssl.transport.pemkey_filepath: /usr/share/wazuh-indexer/config/certs/indexer-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: /usr/share/wazuh-indexer/config/certs/root-ca.pem
    plugins.security.ssl.transport.enforce_hostname_verification: false

    plugins.security.ssl.http.enabled: true
    plugins.security.ssl.http.pemcert_filepath: /usr/share/wazuh-indexer/config/certs/indexer.pem
    plugins.security.ssl.http.pemkey_filepath: /usr/share/wazuh-indexer/config/certs/indexer-key.pem
    plugins.security.ssl.http.pemtrustedcas_filepath: /usr/share/wazuh-indexer/config/certs/root-ca.pem

    plugins.security.authcz.admin_dn:
      - "CN=admin,O=Wazuh,L=California,C=US"
    plugins.security.nodes_dn:
      - "CN={{ include "wazuh.fullname" . }}-indexer,O=Wazuh,L=California,C=US"

    plugins.security.allow_unsafe_democertificates: true
    plugins.security.allow_default_init_securityindex: true
    plugins.security.restapi.roles_enabled: ["all_access", "security_rest_api_access"]
    plugins.security.system_indices.enabled: true
    plugins.security.system_indices.indices: [".opendistro-alerting-config", ".opendistro-alerting-alert*", ".opendistro-anomaly-results*", ".opendistro-anomaly-detector*", ".opendistro-anomaly-checkpoints", ".opendistro-anomaly-detection-state", ".opendistro-reports-*", ".opensearch-notifications-*", ".opensearch-notebooks", ".opensearch-observability", ".ql-datasources", ".opendistro-asynchronous-search-response*", ".replication-metadata-store"]
{{- end }}
