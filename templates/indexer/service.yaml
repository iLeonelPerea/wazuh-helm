apiVersion: v1
kind: Service
metadata:
  name: {{ include "wazuh.fullname" . }}-indexer
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.indexer.selectorLabels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "wazuh.indexer.selectorLabels" . | nindent 4 }}
  ports:
    - name: indexer-rest
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: indexer-nodes
      port: 9300
      targetPort: 9300
      protocol: TCP
