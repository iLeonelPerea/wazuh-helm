apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "wazuh.fullname" . }}-indexer
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.indexer.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "wazuh.fullname" . }}-indexer
  replicas: {{ .Values.indexer.replicas }}
  selector:
    matchLabels:
      {{- include "wazuh.indexer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wazuh.labels" . | nindent 8 }}
        {{- include "wazuh.indexer.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/indexer/configmap.yaml") . | sha256sum }}
        checksum/security: {{ include (print $.Template.BasePath "/indexer/configmap-security.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 1000
      {{- with .Values.indexer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/lib/wazuh-indexer"]
          volumeMounts:
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
      containers:
        - name: wazuh-indexer
          image: "{{ .Values.indexer.image.repository }}:{{ .Values.indexer.image.tag }}"
          imagePullPolicy: {{ .Values.indexer.image.pullPolicy }}
          ports:
            - name: indexer-rest
              containerPort: 9200
              protocol: TCP
            - name: indexer-nodes
              containerPort: 9300
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.indexer.javaOpts | quote }}
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.indexerSecretName" . }}
                  key: password
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.indexerSecretName" . }}
                  key: password
          startupProbe:
            tcpSocket:
              port: indexer-rest
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: indexer-rest
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: indexer-rest
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.indexer.resources | nindent 12 }}
          volumeMounts:
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: indexer-config
              mountPath: /usr/share/wazuh-indexer/config/opensearch.yml
              subPath: opensearch.yml
              readOnly: true
            - name: indexer-certs
              mountPath: /usr/share/wazuh-indexer/config/certs
              readOnly: true
            - name: credentials
              mountPath: /usr/share/wazuh-indexer/creds
              readOnly: true
            - name: indexer-security
              mountPath: /usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml
              subPath: internal_users.yml
              readOnly: true
      volumes:
        - name: indexer-config
          configMap:
            name: {{ include "wazuh.fullname" . }}-indexer-config
        - name: indexer-certs
          secret:
            secretName: {{ include "wazuh.fullname" . }}-indexer-certs
        - name: credentials
          secret:
            secretName: {{ include "wazuh.indexerSecretName" . }}
        - name: indexer-security
          configMap:
            name: {{ include "wazuh.fullname" . }}-indexer-security
  volumeClaimTemplates:
    - metadata:
        name: wazuh-indexer-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.indexer.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.indexer.storage.size }}
