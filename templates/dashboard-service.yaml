apiVersion: v1
kind: Service
metadata:
  name: {{ include "wazuh.fullname" . }}-dashboard
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.dashboard.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "wazuh.dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: dashboard
      port: 5601
      targetPort: 5601
      protocol: TCP
