{{- if .Values.dashboard.enabled }}
{{- if .Values.dashboard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wazuh.fullname" . }}-dashboard
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.dashboard.selectorLabels" . | nindent 4 }}
  {{- with .Values.dashboard.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.dashboard.ingress.ingressClassName }}
  ingressClassName: {{ .Values.dashboard.ingress.ingressClassName }}
  {{- end }}
  {{- if .Values.dashboard.ingress.tls }}
  tls:
    {{- toYaml .Values.dashboard.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.dashboard.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wazuh.fullname" . }}-dashboard
                port:
                  number: 5601
{{- end }}
{{- end }}
