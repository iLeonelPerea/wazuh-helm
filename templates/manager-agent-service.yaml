apiVersion: v1
kind: Service
metadata:
  name: {{ include "wazuh.fullname" . }}-manager-agents
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.manager.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "wazuh.manager.selectorLabels" . | nindent 4 }}
  ports:
    - name: agents-events
      port: 1514
      targetPort: 1514
      protocol: TCP
    - name: agents-auth
      port: 1515
      targetPort: 1515
      protocol: TCP
