{{- if .Values.agent.enabled }}
{{- if and (not .Values.manager.enabled) (not .Values.agent.externalManagerAddress) }}
{{- fail "agent.externalManagerAddress is required when manager.enabled=false (cross-cluster mode). Set it to the Route53 PHZ hostname or IP of the remote Wazuh manager." }}
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "wazuh.fullname" . }}-agent
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    {{- include "wazuh.agent.selectorLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "wazuh.agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "wazuh.labels" . | nindent 8 }}
        {{- include "wazuh.agent.selectorLabels" . | nindent 8 }}
    spec:
      # Required for host-level monitoring: process inventory, rootcheck, FIM, log collection
      # See values.yaml agent section for full security rationale
      hostPID: true
      {{- include "wazuh.dnsConfig" . | nindent 6 }}
      serviceAccountName: {{ include "wazuh.fullname" . }}-agent
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        # Standard K8s scheduling tolerations (NOT wildcard)
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/pid-pressure
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/unschedulable
          operator: Exists
          effect: NoSchedule
        {{- with .Values.agent.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      initContainers:
        - name: resolve-manager
          image: "{{ .Values.global.initImages.busybox.repository }}:{{ .Values.global.initImages.busybox.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          env:
            - name: MANAGER_SVC_HOST
              value: "$(WAZUH_MANAGER_AGENTS_SERVICE_HOST)"
          command:
            - /bin/sh
            - -c
            - |
              {{- if .Values.agent.externalManagerAddress }}
              # Cross-cluster mode: use explicit external manager address (Route53 PHZ / static hostname)
              echo "{{ .Values.agent.externalManagerAddress }}" > /shared/manager-ip
              echo "Using external manager address: {{ .Values.agent.externalManagerAddress }}"
              exit 0
              {{- else }}
              # Same-cluster mode: resolve manager via K8s service or DNS
              # Use Kubernetes auto-injected service env var (zero DNS queries)
              if [ -n "$MANAGER_SVC_HOST" ]; then
                echo "$MANAGER_SVC_HOST" > /shared/manager-ip
                echo "Resolved via env var: $MANAGER_SVC_HOST"
                exit 0
              fi
              # Fallback: hardened DNS resolution with multiple methods and validation
              echo "WARN: Service env var not available, waiting for DNS..."
              SVC="{{ include "wazuh.manager.agents.fqdn" . }}"
              BACKOFF=3

              # Helper function to validate IP address format
              validate_ip() {
                local ip="$1"
                echo "$ip" | grep -qE '^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$'
              }

              # Helper function to resolve IP using multiple methods
              resolve_ip() {
                local hostname="$1"
                local ip=""

                # Method 1: getent hosts (preferred - simple, consistent format)
                ip=$(getent hosts "$hostname" 2>/dev/null | awk '{print $1; exit}')
                if [ -n "$ip" ] && validate_ip "$ip"; then
                  echo "$ip"
                  return 0
                fi

                # Method 2: nslookup fallback (for minimal containers without getent)
                if command -v nslookup >/dev/null 2>&1; then
                  ip=$(nslookup "$hostname" 2>/dev/null | grep -A1 "^Name:" | grep "Address:" | tail -1 | awk '{print $2}')
                  if [ -n "$ip" ] && validate_ip "$ip"; then
                    echo "$ip"
                    return 0
                  fi
                fi

                # No valid IP could be resolved
                return 1
              }

              for i in $(seq 1 20); do
                MANAGER_IP=$(resolve_ip "$SVC")
                if [ -n "$MANAGER_IP" ]; then
                  echo "$MANAGER_IP" > /shared/manager-ip
                  echo "Resolved manager IP: $MANAGER_IP (attempt $i)"
                  exit 0
                fi
                echo "Attempt $i/20: waiting ${BACKOFF}s..."
                sleep $BACKOFF
                # Exponential backoff: 3, 5, 8, 13, 21...
                BACKOFF=$((BACKOFF + (BACKOFF / 2 + 1)))
                [ $BACKOFF -gt 30 ] && BACKOFF=30
              done

              # Final fallback: use FQDN directly, let Wazuh agent handle DNS resolution at runtime
              echo "WARN: Could not resolve manager IP after 20 attempts, using FQDN for runtime resolution"
              echo "$SVC" > /shared/manager-ip
              echo "Manager address will be resolved at agent startup: $SVC"
              exit 0
              {{- end }}
          volumeMounts:
            - name: shared
              mountPath: /shared
        # NOTE: No wait-for-manager init container needed here.
        # Wazuh agents have built-in resilience: they retry connection to manager
        # indefinitely (5 attempts every 10s, then re-registration). Using an init
        # container would block ALL agents on ALL nodes during manager downtime,
        # creating a monitoring gap. Native retry is the recommended pattern per
        # Wazuh documentation and community best practices.
      containers:
        - name: wazuh-agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              MANAGER_IP=$(cat /shared/manager-ip)
              export WAZUH_MANAGER_SERVER="$MANAGER_IP"
              export WAZUH_REGISTRATION_SERVER="$MANAGER_IP"
              echo "Starting agent with manager IP: $MANAGER_IP"
              exec /init
          env:
            - name: WAZUH_MANAGER_PORT
              value: "1514"
            - name: WAZUH_REGISTRATION_PORT
              value: "1515"
            - name: WAZUH_AGENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WAZUH_AGENT_GROUPS
              value: {{ .Values.agent.group | quote }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            - name: shared
              mountPath: /shared
              readOnly: true
            - name: host-var-log
              mountPath: /var/log
              readOnly: true
            - name: host-etc
              mountPath: /host/etc
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: shared
          emptyDir: {}
        - name: host-var-log
          hostPath:
            path: /var/log
        - name: host-etc
          hostPath:
            path: /etc
        - name: host-proc
          hostPath:
            path: /proc
{{- end }}
