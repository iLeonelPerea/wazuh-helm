{{- if .Values.cleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "wazuh.fullname" . }}-manager-cleanup
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cleanup.schedule | quote }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "wazuh.fullname" . }}-cleanup
          containers:
            - name: cleanup
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "=== Wazuh Manager Disk Cleanup ==="
                  MANAGER_POD="{{ include "wazuh.fullname" . }}-manager-0"
                  NS="{{ .Release.Namespace }}"

                  echo "Before:"
                  kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                    du -sh /var/ossec/data/queue/vd_updater/ 2>/dev/null || true

                  # Clean vd_updater temp files (bug in 4.14.x - never auto-cleaned)
                  kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                    sh -c 'rm -rf /var/ossec/data/queue/vd_updater/tmp/contents/* /var/ossec/data/queue/vd_updater/tmp/downloads/*' 2>/dev/null || true

                  echo "After:"
                  kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                    du -sh /var/ossec/data/queue/vd_updater/ 2>/dev/null || true

                  echo "Disk usage:"
                  kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                    df -h /var/ossec/data
{{- end }}
