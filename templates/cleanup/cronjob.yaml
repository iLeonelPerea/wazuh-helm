{{- if .Values.cleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "wazuh.fullname" . }}-manager-cleanup
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cleanup.schedule | quote }}
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "wazuh.fullname" . }}-cleanup
          nodeSelector:
            workload: wazuh
          tolerations:
            - key: workload
              value: wazuh
              effect: NoSchedule
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: cleanup
              image: "{{ .Values.global.initImages.kubectl.repository }}:{{ .Values.global.initImages.kubectl.tag }}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              command:
                - /bin/sh
                - -c
                - |
                  echo "=== Wazuh Manager Disk Cleanup ==="
                  NS="{{ .Release.Namespace }}"

                  for i in $(seq 0 {{ sub (int .Values.manager.replicas) 1 }}); do
                    MANAGER_POD="{{ include "wazuh.fullname" . }}-manager-${i}"
                    echo "--- Cleaning $MANAGER_POD ---"

                    echo "Before:"
                    kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                      du -sh /var/ossec/data/queue/vd_updater/ 2>/dev/null || true

                    # Clean vd_updater temp files (bug in 4.14.x - never auto-cleaned)
                    kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                      sh -c 'rm -rf /var/ossec/data/queue/vd_updater/tmp/contents/* /var/ossec/data/queue/vd_updater/tmp/downloads/*' 2>/dev/null || true

                    echo "After:"
                    kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                      du -sh /var/ossec/data/queue/vd_updater/ 2>/dev/null || true

                    echo "Disk usage:"
                    kubectl exec "$MANAGER_POD" -n "$NS" -c wazuh-manager -- \
                      df -h /var/ossec/data
                  done
{{- end }}
